name: Debug staging (one-shot)
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy main to crm-staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"

            echo "=== revert production .env ==="
            sed -i 's|WEBHOOK_BASE_URL=https://crm-staging\.globusdemos\.com/|WEBHOOK_BASE_URL=https://crm.globusdemos.com/|g' ~/globussoft-crm/backend/.env
            grep WEBHOOK_BASE_URL ~/globussoft-crm/backend/.env
            pm2 restart globussoft-crm-backend --update-env 2>&1 | tail -3

            echo "=== revert staging .env ==="
            sed -i 's|WEBHOOK_BASE_URL=https://crm-staging\.globusdemos\.com/|WEBHOOK_BASE_URL=https://crm.globusdemos.com/|g' ~/globussoft-crm-staging/backend/.env
            grep WEBHOOK_BASE_URL ~/globussoft-crm-staging/backend/.env
            pm2 restart globussoft-crm-staging-backend --update-env 2>&1 | tail -3

            echo "done"