name: Debug staging (one-shot)
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy main to crm-staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"

            echo "=== all pm2 processes ==="
            pm2 list

            echo "=== crm-staging nginx config ==="
            grep -r "crm-staging" /etc/nginx/sites-enabled/ -l 2>/dev/null | xargs cat 2>/dev/null || \
            grep -r "crm-staging" /etc/nginx/conf.d/ -l 2>/dev/null | xargs cat 2>/dev/null || \
            echo "not found in sites-enabled or conf.d"

            echo "=== staging .env DATABASE_URL ==="
            grep DATABASE_URL /home/empcloud-development/globussoft-crm/backend/.env

            echo "=== available mysql databases ==="
            mysql -u root -e "SHOW DATABASES;" 2>/dev/null || \
            node -e "
            const { execSync } = require('child_process');
            require('dotenv').config({ path: '/home/empcloud-development/globussoft-crm/backend/.env' });
            const url = process.env.DATABASE_URL;
            console.log('DATABASE_URL:', url);
            " 2>/dev/null

            echo "done"