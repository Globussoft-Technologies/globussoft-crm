name: Debug staging (one-shot)
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy main to crm-staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"

            echo "=== staging backend process details ==="
            pm2 show globussoft-crm-staging-backend

            echo "=== staging backend cwd ==="
            STAGING_PID=$(pm2 pid globussoft-crm-staging-backend 2>/dev/null)
            ls -la /proc/$STAGING_PID/cwd 2>/dev/null || echo "pid $STAGING_PID"

            echo "done"