name: Deploy to demo server (crm.globusdemos.com)

on:
  push:
    branches: [main, staging_crm]
    paths-ignore:
      # Skip the entire workflow when only docs / operator scripts change.
      # (paths-ignore does NOT support !negation — keep this as a flat list.)
      - "**/*.md"
      - "docs/**"
      - "backend/scripts/**"
      - ".gitignore"
      # NOTE: e2e/** is intentionally NOT ignored anymore — changes to specs
      # should trigger the api_tests job so we know the new spec passes
      # before deploying. The deploy job itself doesn't depend on any e2e
      # file at runtime; the api_tests job runs them.
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: "Skip frontend build (backend-only deploy)"
        type: boolean
        default: false
      skip_tests:
        description: "Skip build + api_tests gates (emergency hotfix only)"
        type: boolean
        default: false
      seed_wellness:
        # Re-runs prisma/seed-wellness.js on the demo box AFTER the schema
        # sync step succeeds. Defaults false on regular pushes — only set
        # this when a release adds new seeded models / rows that the
        # additive `prisma db push` cannot create on its own (e.g. v3.6.0
        # added the Drug model + 16 drug rows; the model landed via
        # `db push` but the rows required a manual seed-on-demo run, and
        # drugs-api e2e-full specs went red until someone noticed).
        # Idempotent — every upsert keys on (tenantId, name).
        # Alternative trigger: scripts/seed-drugs-on-demo.py.
        description: "Re-run seed-wellness.js after schema sync (use after adding new seeded models)"
        type: boolean
        default: false

# One deploy at a time — never cancel an in-flight deploy. A half-finished
# deploy on prod is worse than the next push waiting in the queue.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ── 1. BUILD: backend syntax-check + frontend vite build ────────────
  # Catches JSX errors, import typos, missing modules, npm install failures.
  # No DB, no server boot — pure static validation. ~3 min.
  build:
    if: ${{ inputs.skip_tests != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — npm ci + prisma generate + syntax check
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx prisma generate
          # Parse-check every backend .js — catches the kind of class of
          # bugs the cleanup-script Python-docstring header had on first
          # write (lesson from a 2026-04-27 dev cycle).
          fails=0
          while IFS= read -r f; do
            if ! node --check "$f" >/dev/null 2>&1; then
              echo "::error file=$f::node --check failed"
              fails=$((fails + 1))
            fi
          done < <(find . -path ./node_modules -prune -o -name "*.js" -print)
          if [ $fails -gt 0 ]; then
            echo "::error::$fails backend file(s) failed parse-check"
            exit 1
          fi
          echo "::notice::All backend .js files parse cleanly"

      - name: Frontend — npm ci + vite build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          # Vite build catches JSX / import errors AND ensures the bundle
          # actually compiles. Output goes to dist/ which we just
          # discard — the deploy job rebuilds on the server.
          npx vite build --logLevel=error
          du -sh dist
          echo "::notice::Frontend bundle builds cleanly"

      - name: Frontend — bundle-size budget gate (CI-6)
        working-directory: frontend
        # Compare per-chunk + total sizes against
        # frontend/.bundle-size-budget.json. Fails if any chunk exceeds
        # its budget OR total JS/CSS exceeds the global budget. Catches
        # the class of regressions where a new dep silently bloats a
        # vendor chunk by 10x without anyone noticing.
        run: |
          set -euo pipefail
          npm run check:bundle-size
          echo "::notice::Bundle-size budget OK"

  # ── 2. API_TESTS: run our pure-API specs against a CI-local backend ──
  # Spins up MySQL 8 service container, seeds, boots backend on :5000,
  # runs ci-smoke.spec.js (4 tests). Promoted from informational to
  # MANDATORY on a7962b3 after a green run confirmed the fixture-init
  # issue (missing playwright/.auth/user.json) is resolved. Future
  # spec additions (sms-api, marketing-api, reports-api, voice-
  # transcription-api, knowledge-base-api, portal-api) get added to
  # the test list one-by-one in the Run step as each is verified
  # against a freshly-seeded CI database.
  api_tests:
    if: ${{ inputs.skip_tests != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pw
          MYSQL_DATABASE: gbscrm_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci_root_pw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    env:
      DATABASE_URL: "mysql://root:ci_root_pw@127.0.0.1:3306/gbscrm_ci"
      JWT_SECRET: "ci_jwt_secret_for_test_runs_only"
      DISABLE_CRONS: "1"
      NODE_ENV: "test"
      PORT: "5000"
      # G-15: enable field-level encryption so backup-engine-api.spec.js's
      # PII-safety assertion grades the dump for plaintext PII against a
      # real ENC:v1: ciphertext value (not the documented no-op-when-
      # unset fallback). 64 hex chars = 32 bytes per lib/fieldEncryption.js.
      WELLNESS_FIELD_KEY: "ci0123456789abcdef0123456789abcdef0123456789abcdef0123456789ab"
      # v3.4.9 wellness-portal-dsar-api.spec.js needs the demo-OTP bypass
      # (#238/#292) to mint a portal token for the seeded "+919876500001"
      # patient (seed-wellness.js:333-355). routes/wellness.js:4287-4299 gates
      # the bypass on three conditions: WELLNESS_DEMO_OTP env-var set,
      # NODE_ENV !== 'production' (we set 'test' above), AND the phone in
      # WELLNESS_DEMO_OTP_PHONES (defaults to "9876500001" — matches the
      # seeded patient, no override needed). Without this env-var the
      # spec's beforeAll blocks at verify-otp 401 and every test in the
      # file fails. Demo box has the same env-var per the v3.4.9 release
      # checklist.
      WELLNESS_DEMO_OTP: "1234"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            e2e/package-lock.json

      - name: Install mysql-client (for G-15 backup-engine-api.spec.js)
        # ubuntu-latest ships mysqladmin (used by the wait loop below)
        # but NOT mysqldump — mysqldump lives in the mysql-client
        # package. cron/backupEngine.js shells `mysqldump` from PATH;
        # without this step the G-15 spec would skip its file-creation
        # tests with a "mysqldump unreachable" warning. Adds ~5s install.
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mysql-client
          mysqldump --version

      - name: Wait for MySQL ready
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -pci_root_pw --silent; then
              echo "MySQL ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Backend — install + prisma db push + seed
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx prisma generate
          # Apply schema to the empty CI database. Prisma `db push` is the
          # right call here (no migrations needed for a fresh CI DB).
          npx prisma db push --skip-generate --accept-data-loss
          # Seed the generic + wellness + travel tenants so the API specs
          # have the demo creds they expect.
          node prisma/seed.js
          if [ -f prisma/seed-wellness.js ]; then
            node prisma/seed-wellness.js
          fi
          if [ -f prisma/seed-travel.js ]; then
            node prisma/seed-travel.js
          fi
          echo "::notice::Database seeded for CI"

      - name: Boot backend on :5000 (DISABLE_CRONS=1)
        working-directory: backend
        run: |
          # Background nohup so the next step can run the e2e suite against it.
          nohup node server.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          # Poll /api/health until ready (10s budget).
          for i in $(seq 1 20); do
            if curl -fs http://127.0.0.1:5000/api/health 2>/dev/null | grep -q "healthy"; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend failed to reach healthy in 20s"
          tail -50 /tmp/backend.log
          exit 1

      - name: E2E install (no browser binary — gated specs are request-only)
        working-directory: e2e
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          # DELIBERATELY no `playwright install chromium`. Every spec in the
          # gate list below uses Playwright's `request` (HTTP) fixture — none
          # launch a browser. The one UI test (forgot-password.spec.js) skips
          # at COLLECTION time under IS_LOCAL_STACK, so its `page` fixture is
          # never resolved and no browser launch is attempted. Skipping the
          # 167 MB Chromium download cuts ~9-12 min off EVERY run (the runner
          # CDN throttles this download badly + the cache missed whenever a
          # run failed before its post-save step). If a future GATED spec
          # needs a real browser, re-add `npx playwright install chromium`
          # (and ideally an actions/cache step on ~/.cache/ms-playwright).
          # The chromium project sets storageState: playwright/.auth/user.json
          # (created by the auth.setup project, which we skip via --no-deps).
          # Pre-create an empty state so the project loads without ENOENT.
          mkdir -p playwright/.auth
          echo '{"cookies":[],"origins":[]}' > playwright/.auth/user.json

      - name: Run API-only specs
        working-directory: e2e
        env:
          BASE_URL: "http://127.0.0.1:5000"
          E2E_SKIP_SCRUB: "1"
        run: |
          set -euo pipefail
          # Promotion ladder. Each spec gets added once it's been
          # verified to pass against a freshly-seeded CI database.
          # Currently in the gate:
          #   - ci-smoke.spec.js              ( 4 tests: health/login/auth-gate)
          #   - sms-api.spec.js              (44 tests: routes/sms.js)
          #   - marketing-api.spec.js        (41 tests: routes/marketing.js)
          #   - reports-api.spec.js          (52 tests: routes/reports.js)
          #   - sla-breach-api.spec.js       (48 tests: cron/slaBreachEngine.js)
          #   - treatment-plans-api.spec.js  (40 tests: controllers/treatmentPlanController.js)
          #   - sequence-engine-api.spec.js  (49 tests: cron/sequenceEngine.js)
          #   - expenses-api.spec.js         (37 tests: routes/expenses.js)
          #   - projects-api.spec.js         (37 tests: routes/projects.js)
          #   - ai-scoring-api.spec.js       (23 tests: routes/ai_scoring.js)
          #   - contracts-api.spec.js        (37 tests: routes/contracts.js)
