          #   - api-docs.spec.js             ( 5 tests: /api-docs Swagger UI + /api-docs/swagger.json OpenAPI raw spec — #542)
          #   - wellness-rbac-regression-api.spec.js (21 tests: companion to wellness-rbac-api covering #259/#280/#323/#324/#325/#326/#348 + #527/#533 PHI gates — P0 from regression-coverage-backlog)
          #   - auth-security-regression-api.spec.js (21 tests: companion to auth-security-api covering #186/#191/#192/#254/#269/#292/#295/#300/#342 + #343/#344 storage-policy file-grep — P1 from regression-coverage-backlog)
          #   - audit-coverage-api.spec.js   (30 tests: AuditLog emission per mutating endpoint across Contact/Deal/Patient/Invoice/Estimate/Task/Pipeline/Notification — closes #134/#167/#179/#180 from regression-coverage-backlog item #5)
