          #   - knowledge-base-api.spec.js   (15 tests: routes/knowledge_base.js public + authed CRUD — orphan-wave 2026-05-17)
          #   - landing-pages-api.spec.js    (41 tests: routes/landing_pages.js admin CRUD + duplicate + analytics — G-1 orphan-wave 2026-05-17)
          #   - portal-api.spec.js           (16 tests: routes/portal.js public + auth gates + #238 verify-otp — orphan-wave 2026-05-17)
          #   - tenant-switch-disabled-api.spec.js (5 tests: #555 lock-per-session policy contract — orphan-wave 2026-05-17)
