name: Full E2E suite (release validation)

# Heavyweight Playwright run — the FULL chromium project (UI flows,
# wellness deep, a11y, integration, auth, api-health) against the
# deployed target URL. Runs ONLY on release-style events:
#   - push of a tag matching v* (the normal release path: tag a green
#     main commit AFTER its deploy.yml run has succeeded)
#   - GitHub Release published (alternate)
#   - workflow_dispatch (manual; lets you point at any URL)
#
# Per-commit CI stays fast — deploy.yml's api_tests job keeps to the
# 18 gated API specs (~2-3 min). This release validation runs the full
# Playwright surface (~10-20 min) and is opt-in by tagging.
#
# Recommended release flow:
#   1. Push to main — deploy.yml deploys to demo + smoke-checks
#   2. Wait for the deploy job to go green
#   3. Tag the commit:    git tag v3.2.6 && git push origin v3.2.6
#   4. This workflow fires + runs the full suite against demo
#   5. If green, the tag stands as a verified release. If red, the
#      demo isn't broken (deploy.yml's smoke check already passed) but
#      a deeper UI/flow regression has surfaced — fix it on main and
#      retag.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL for the suite (defaults to demo)'
        type: string
        default: 'https://crm.globusdemos.com'

# Don't cancel a release validation that's already running. Two tags
# in quick succession should both get full coverage.
concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Sharded matrix: chromium project is ~2,578 tests, can't fit in a
  # single 30-min runner. Playwright's --shard flag splits the test list
  # into N equal slices that run in parallel; each slice gets ~645 tests
  # / ~15 min wall time. All 4 shards execute concurrently, so total
  # release-validation latency stays around 15-20 min.
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Resolve target URL
        id: target
        run: |
          # Prefer workflow_dispatch input; else demo.
          BASE_URL='${{ inputs.base_url }}'
          if [ -z "$BASE_URL" ]; then
            BASE_URL='https://crm.globusdemos.com'
          fi
          echo "BASE_URL=$BASE_URL" >> $GITHUB_OUTPUT
          echo "::notice::Shard ${{ matrix.shard }}/4 running against $BASE_URL"

      - name: Wait for target health (up to 2 min)
        env:
          BASE_URL: ${{ steps.target.outputs.BASE_URL }}
        run: |
          for i in $(seq 1 24); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' "$BASE_URL/api/health")
            if [ "$code" = "200" ]; then
              echo "Target healthy after ${i} attempt(s)"
              exit 0
            fi
            echo "  [try $i] /api/health -> $code"
            sleep 5
          done
          echo "::error::Target $BASE_URL did not become healthy in 2 min"
          exit 1

      - name: Install + browsers
        working-directory: e2e
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run shard ${{ matrix.shard }}/4
        working-directory: e2e
        env:
          BASE_URL: ${{ steps.target.outputs.BASE_URL }}
          # E2E_SKIP_SCRUB stays ON for the per-shard step. Each shard
          # would otherwise run its OWN globalTeardown at the end of its
          # slice and DELETE all rows matching `^E2E_FLOW_/Race_/...`,
          # including fixtures the other 3 shards are still using mid-test
          # (they all hit the same demo DB). The race is real — shard 2's
          # spec creates a fixture, shard 1 finishes + teardown wipes it,
          # shard 2's next assertion fails. The single post-matrix
          # `scrub-demo` job below handles cleanup once for the whole run.
          E2E_SKIP_SCRUB: '1'
        run: |
          set -euo pipefail
          # Three projects covered (each sharded independently):
          #   - chromium     — bulk of tests (UI, wellness, integration, a11y)
          #                    auto-runs `setup` first via `dependencies: ['setup']`
          #   - auth-tests   — login flow validation (no saved auth state)
          #   - api-health   — /api/* smoke tests with bearer auth
          # Skipped (would 3-4x runtime; out of scope for release validation):
          #   - firefox, webkit, mobile-chrome
          npx playwright test \
            --project=chromium \
            --project=auth-tests \
            --project=api-health \
            --shard=${{ matrix.shard }}/4 \
            --reporter=list,blob

      - name: Upload blob report (will be merged across shards)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-${{ matrix.shard }}
          path: e2e/blob-report
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 30

  # ── Merge the 4 sharded blob reports into a single HTML report ──
  merge-reports:
    if: always()
    needs: e2e-full
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install playwright (for merge-reports)
        working-directory: e2e
        run: npm ci --no-audit --no-fund

      - name: Download all blob reports
        uses: actions/download-artifact@v5
        with:
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into single HTML report
        working-directory: e2e
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v5
        with:
          name: e2e-full-html-report-${{ github.ref_name }}-${{ github.run_id }}
          path: e2e/playwright-report/
          retention-days: 30

      - name: Summary
        env:
          BASE_URL: ${{ inputs.base_url || 'https://crm.globusdemos.com' }}
        run: |
          {
            echo "## Full e2e validation (4-shard parallel run)"
            echo ""
            echo "- Target: \`$BASE_URL\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "- Tag: \`${{ github.ref_name }}\`"
            fi
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "- Release: \`${{ github.event.release.tag_name }}\`"
            fi
            echo ""
            echo "Per-shard outcome: see \`e2e-full\` matrix above."
            echo "Merged HTML report: download \`e2e-full-html-report-*\` artifact."
          } >> $GITHUB_STEP_SUMMARY

  # ── Post-matrix demo scrub ─────────────────────────────────────────
  # The 4-shard e2e-full matrix runs with E2E_SKIP_SCRUB=1 to avoid
  # an inter-shard race (each shard's globalTeardown would otherwise
  # delete all E2E_*/Race_*/PHI Audit/etc. rows, including fixtures
  # the other 3 shards are still using mid-test). This job runs ONCE
  # after all shards complete and runs the same scrub the demo
  # operator would have run by hand: regex-delete test residue +
  # merge real-name patient duplicates that the suite's seed-and-write
  # paths produce (Kavita Reddy x9 etc).
  #
  # `if: always()` so a failed shard (which still left residue) gets
  # cleaned. Gated on the target being demo — if someone points
  # workflow_dispatch at a non-demo URL we skip rather than SSH into
  # a different host.
  scrub-demo:
    if: always()
    needs: e2e-full
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Decide whether to scrub
        id: gate
        env:
          BASE_URL: ${{ inputs.base_url || 'https://crm.globusdemos.com' }}
        run: |
          if [[ "$BASE_URL" == *"crm.globusdemos.com"* ]]; then
            echo "should_scrub=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Target is demo — will run scrub + dedup"
          else
            echo "should_scrub=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Target $BASE_URL is not demo — skipping scrub"
          fi

      - name: Scrub demo + merge dup patients
        if: steps.gate.outputs.should_scrub == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # 4 min cap — scrub typically finishes in ~30s, dedup in <10s,
          # but headroom for a degenerate run that created 1000s of rows.
          command_timeout: 4m
          script: |
            set -euo pipefail
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            cd ~/globussoft-crm
            echo "=== scrub-test-data-pollution.js --apply ==="
            node backend/scripts/scrub-test-data-pollution.js --apply
            echo ""
            echo "=== merge-duplicate-patients.js --commit ==="
            node backend/scripts/merge-duplicate-patients.js --commit

      - name: Skipped notice
        if: steps.gate.outputs.should_scrub != 'true'
        run: echo "::notice::Skipped scrub — target was not the demo box"
