name: Hotfix — patch staging env (one-shot)
on:
  workflow_dispatch:
jobs:
  patch-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check whatsapp send route
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            APP=$(pm2 info globussoft-crm-backend 2>/dev/null | grep -oP "script path\s*[│|]\s*\K[^\s│|]+" | head -1)
            BACKEND=$(dirname "$APP")
            echo "deployed file: $BACKEND/routes/whatsapp.js"
            echo "---"
            grep -nc "enqueueSend" "$BACKEND/routes/whatsapp.js"
            echo "--- /send handler region:"
            sed -n '250,325p' "$BACKEND/routes/whatsapp.js"
