name: Hotfix — patch staging env (one-shot)
on:
  workflow_dispatch:
jobs:
  patch-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check WaOutboundJob table
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            cd /home/empcloud-development/globussoft-crm/backend
            node -e "
            const p = new (require('@prisma/client').PrismaClient)();
            p.\$queryRaw\`SHOW TABLES LIKE 'WaOutboundJob'\`
              .then(r => { console.log('RESULT:', JSON.stringify(r)); process.exit(0); })
              .catch(e => { console.error('ERROR:', e.message); process.exit(1); });
            "
