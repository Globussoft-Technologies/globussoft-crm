name: Hotfix — patch staging env (one-shot)
on:
  workflow_dispatch:
jobs:
  patch-env:
    runs-on: ubuntu-latest
    steps:
      - name: PM2 logs grep
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            pm2 logs globussoft-crm-backend --lines 300 --nostream 2>&1 | grep -iE "whatsapp|prisma|graph.facebook" || echo "NO MATCHES"
