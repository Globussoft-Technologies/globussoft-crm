name: Hotfix — patch staging env (one-shot)
on:
  workflow_dispatch:
jobs:
  patch-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check WaOutboundJob table
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            export PATH="$HOME/.nvm/versions/node/v24.14.0/bin:$PATH"
            cd /home/empcloud-development/globussoft-crm/backend
            DB_URL=$(grep DATABASE_URL .env | cut -d'=' -f2-)
            DB_PASS=$(echo "$DB_URL" | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|')
            DB_USER=$(echo "$DB_URL" | sed 's|.*://\([^:]*\):.*|\1|')
            DB_HOST=$(echo "$DB_URL" | sed 's|.*@\([^:/]*\)[:/].*|\1|')
            DB_NAME=$(echo "$DB_URL" | sed 's|.*/\([^?]*\).*|\1|')
            mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SHOW TABLES LIKE 'WaOutboundJob';" 2>/dev/null
