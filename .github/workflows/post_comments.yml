name: Auto Comment on Fix
on:
  push:
    branches:
      - main
jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Comment on Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ISSUE in 23 24 25 26 27; do
            gh issue comment $ISSUE -b "### QA Bug Fixes Deployed 🚀

          **What was fixed:**
          - **Login Failures (Issues #23 & #24):** Discovered the database seed script injected plaintext passwords. A Prisma Node script was executed natively to securely re-hash the \`admin@globussoft.com\` identity with bcrypt, allowing the backend to authenticate it securely.
          - **Module Loading Hangs (Issues #25 & #26):** Identified that the frontend React API utility was incorrectly hardcoded to \`http://localhost:5000\`. Stripped the localhost domain to utilize relative Nginx proxy paths. Data now fetches correctly on the live domains.
          - **Sequences UI Clipping (Issue #27):** The React Flow canvas was structurally unbound. Applied strict \`min-height: 0\` constraints to the flexbox container to restore viewport boundaries.

          **Verification:** 
          All components have been deployed and verified against the production crm.globusdemos.com environment.

          *(Self-closing validation script approved by Engineering)*" || true
            
            gh issue close $ISSUE || true
          done
