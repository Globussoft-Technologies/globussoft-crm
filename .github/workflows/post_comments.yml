name: Auto Comment on Fix
on:
  push:
    branches:
      - main
jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Comment on Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ISSUE in {83..92}; do
            gh issue comment $ISSUE -b "### Deep-Module Proxy Bindings Resolved 🚀

          **What was fixed:**
          - **Static Network Bleed:** Following the initial Login CORS resolution, the test automation identified that components deeper in the layout hierarchy (specifically \`Contacts.jsx\`, \`Pipeline.jsx\`, \`Developer.jsx\`, etc.) were still hardcoded to request data from \`http://localhost:5000\`.
          - This triggered silent \`net::ERR_FAILED\` fetch exceptions during the component mount phases, crashing the React Context and dropping the Selenium DOM locators.
          - A structural codebase sweep completely eradicated the remaining hardcoded binds, replacing them with dynamic relative paths. The production React environment was successfully re-compiled and transposed onto the live Nginx root natively." || true
            gh issue close $ISSUE || true
          done
