name: PR pre-merge checks (build + lint)

# Closes #521. Surfaced by the PR #453 incident: the PR shipped with
# literal git conflict markers (<<<<<<<, =======, >>>>>>>) in two source
# files because PR-level CI only ran secret-scan + migration-check at the
# time. The conflict markers slipped through review; the per-push deploy
# gate ran ONLY after squash-merge to main, where build/lint went red and
# blocked the deploy until a follow-up cleanup commit (aa59133) landed.
#
# This workflow mirrors the build + lint jobs from deploy.yml so the same
# class of failure fails the PR check before merge instead of after.
# It deliberately does NOT run api_tests / unit_tests / frontend_unit_tests
# / migration_check — those need a MySQL container or substantial setup
# and would dominate PR-level CI time. Build (vite build catches conflict
# markers + JSX/import errors) + lint (ESLint catches the bare req.user.id
# anti-pattern + jsx-a11y misuse + parse errors) cover the highest-value
# pre-merge signals at ~3-5 min runtime.
#
# If a PR's commits later land on main, deploy.yml runs the FULL gate
# matrix (build/lint/api_tests/unit_tests/frontend_unit_tests/migration_check
# → deploy). PR-level checks are a fast-path subset, not a replacement.

on:
  pull_request:
    branches: [main, staging_crm]
    # Skip docs-only / scripts-only / tests-only PRs the same way deploy.yml
    # does on push-to-main, so PRs touching only those don't burn CI minutes
    # on a build that has nothing to verify.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "TODOS.md"
      - "CHANGELOG.md"
      - "scripts/**"
      - ".github/**"
      - "qa_screenshots/**"
      - "e2e_screenshots/**"

concurrency:
  # Cancel an in-flight PR-checks run when a new commit lands on the same PR.
  # Keep main-branch runs unique by their ref so they don't cancel each other.
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── BUILD: vite build + node --check ─────────────────────────────────
  # Catches conflict markers, JSX errors, import typos, missing modules.
  # No DB, no server boot. ~3 min.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — npm ci + prisma generate + syntax check
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx prisma generate
          fails=0
          while IFS= read -r f; do
            if ! node --check "$f" >/dev/null 2>&1; then
              echo "::error file=$f::node --check failed"
              fails=$((fails + 1))
            fi
          done < <(find . -path ./node_modules -prune -o -name "*.js" -print)
          if [ $fails -gt 0 ]; then
            echo "::error::$fails backend file(s) failed parse-check"
            exit 1
          fi
          echo "::notice::All backend .js files parse cleanly"

      - name: Frontend — npm ci + vite build
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npx vite build --logLevel=error
          du -sh dist
          echo "::notice::Frontend bundle builds cleanly"

  # ── LINT: ESLint over backend + frontend ─────────────────────────────
  # Catches bare req.user.id (the JWT key is userId), jsx-a11y misuse,
  # parse errors. ~2 min.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — npm ci
        working-directory: backend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Run backend ESLint
        working-directory: backend
        run: |
          set -euo pipefail
          npm run lint
          echo "::notice::Backend ESLint passed (errors=0; warnings allowed on legacy code)"

      - name: Frontend — npm ci
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund

      - name: Run frontend ESLint
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run lint
          echo "::notice::Frontend ESLint passed (errors=0; warnings allowed on legacy code)"

  # ── SILENT-REVERT AUDIT (#755) ───────────────────────────────────────
  # Closes #755 — the b78e484 / PR #566 / PR #710 / PR #729 silent-revert
  # pattern: PRs branched from older commits silently revert any work
  # landed on main between when the PR was cut and when it merged. Per
  # CLAUDE.md "PR review against current main, not the PR's base":
  #
  #   git diff main..<pr_head> -- <file>  is the load-bearing read
  #
  # This job runs that audit automatically on every PR. It does NOT fail
  # the PR — just emits ::warning lines listing files that have changed
  # on main since the PR's merge-base AND are also touched by the PR.
  # The maintainer reviews each flagged file's current-main vs PR-head
  # diff before merging.
  #
  # Long-running branches (staging_crm in particular — see #755) tend to
  # accumulate this risk silently across many small PRs. The annotations
  # surface that risk inline on the PR's "Files changed" tab.
  silent-revert-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
        with:
          # Need history to compute merge-base + main diffs.
          fetch-depth: 0
      - name: Audit silent-revert risk
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          BASE_SHA=$(git merge-base origin/main HEAD)
          HEAD_SHA=$(git rev-parse HEAD)
          MAIN_SHA=$(git rev-parse origin/main)
          AGE_COMMITS=$(git rev-list --count "$BASE_SHA..origin/main")
          echo "Merge-base: $BASE_SHA"
          echo "PR head:    $HEAD_SHA"
          echo "main HEAD:  $MAIN_SHA"
          echo "Commits on main since merge-base: $AGE_COMMITS"

          # Files modified on main since the merge-base (excluding renames+deletes)
          MAIN_DIFF=$(git diff --name-only "$BASE_SHA" "origin/main" | sort -u)
          # Files this PR touches relative to merge-base
          PR_DIFF=$(git diff --name-only "$BASE_SHA" HEAD | sort -u)
          # Overlap = files that exist in both diffs (silent-revert candidates)
          OVERLAP=$(comm -12 <(echo "$MAIN_DIFF") <(echo "$PR_DIFF") | grep -v '^$' || true)

          if [ -z "$OVERLAP" ]; then
            echo "::notice::No silent-revert risk: PR's touched files are unchanged on main since the merge-base (age=${AGE_COMMITS} commits)."
            exit 0
          fi

          COUNT=$(echo "$OVERLAP" | wc -l)
          echo "::warning::Silent-revert audit: this PR touches $COUNT file(s) that have changed on main since the merge-base (age=${AGE_COMMITS} commits). Review each against current main before merging — the PR's version may silently revert recent work. See CLAUDE.md 'PR review against current main' standing rule."
          echo "$OVERLAP" | while IFS= read -r f; do
            echo "::warning file=$f::Silent-revert candidate: this file changed on main since the merge-base. Verify the PR's version is not reverting recent fixes by running: git diff origin/main..HEAD -- '$f'"
          done

          # Don't fail the job — surface the risk and let the maintainer judge.
          # Per #755, the action is "audit, don't block" because most overlaps
          # are intentional (e.g. two engineers editing different functions in
          # the same file). The warnings are the load-bearing artifact.
