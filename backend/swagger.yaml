      tags: [Contacts]
      responses:
        "204": { description: Soft-deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /contacts/by-status:
    get:
      summary: Bucketed counts by status
      tags: [Contacts]
      responses:
        "200":
          description: Counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  Lead: { type: integer }
                  Prospect: { type: integer }
                  Customer: { type: integer }
                  Churned: { type: integer }
  /contacts/import-csv:
    post:
      summary: Bulk-import contacts from a CSV upload
      description: Multipart `file=<csv>`. Returns import summary with row-level errors.
      tags: [Contacts]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: integer }
                  skipped: { type: integer }
