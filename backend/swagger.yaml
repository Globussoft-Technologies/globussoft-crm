  # ════════════════════════════════════════════════════════════════════
  # COMMUNICATIONS
  # ════════════════════════════════════════════════════════════════════
  /email/send:
    post:
      summary: Send transactional email
      description: |
        Sends an email through the tenant's configured provider (Mailgun /
        Nodemailer / SMTP). Supports template substitution + multi-recipient
        in a single call.

        **Rate-limited** per tenant via `sendLimiter`.
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body]
              properties:
                to:
                  oneOf:
                    - type: string
                    - type: array
                      items: { type: string, format: email }
                subject: { type: string }
                body: { type: string }
                templateId: { type: integer, nullable: true }
                templateVars: { type: object, nullable: true }
                contactId: { type: integer, nullable: true }
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema:
                type: object
                description: |
                  For single-recipient calls the response is `{ email, messageId, delivered }`
                  with extra top-level back-compat fields. For multi-recipient calls (#435)
                  the response also carries `{ totalSent, totalFailed, results, failures }`.
                properties:
                  email: { type: object }
                  messageId: { type: string }
                  delivered: { type: boolean }
                  totalSent: { type: integer }
                  totalFailed: { type: integer }
                  results:
                    type: array
                    items: { type: object }
                  failures:
                    type: array
                    items: { type: object }
        "429":
          $ref: '#/components/responses/RateLimited'
  /email-scheduling:
    post:
      summary: Schedule an email for future send
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body, scheduledFor]
              properties:
                to: { type: string, format: email }
                subject: { type: string }
                body: { type: string }
                scheduledFor: { type: string, format: date-time }
      responses:
        "201": { description: Scheduled. }
  /email/inbound:
    post:
      summary: Mailgun / SMTP inbound-email webhook
      description: Routed to `email_inbound.js`. HMAC verified.
      tags: [Communications]
      security:
        - WebhookSignature: []
      responses:
        "200": { description: Ack. }
  /sms/send:
    post:
      summary: Send an SMS
      description: |
        Outbound SMS via the configured provider. `senderId` is validated
        per provider (MSG91 requires exactly 6 alpha chars).
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, body]
              properties:
                to: { type: string }
                body: { type: string, maxLength: 1600 }
                senderId: { type: string, maxLength: 6, nullable: true }
                templateId: { type: integer, nullable: true }
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SmsMessage' }
        "400": { $ref: '#/components/responses/ValidationError' }
        "429": { $ref: '#/components/responses/RateLimited' }
  /whatsapp/send:
    post:
      summary: Send a WhatsApp message
      description: |
        Outbound WhatsApp Cloud API message. Uses an approved template
        outside the 24-h customer-service window, free-form text inside it.
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, description: E.164 phone number. }
                body: { type: string }
                templateName: { type: string, nullable: true }
                templateVars:
                  type: array
                  items: { type: string }
                mediaUrl: { type: string, nullable: true }
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WhatsAppMessage' }
  /whatsapp/webhook:
    post:
      summary: WhatsApp Cloud API webhook (inbound + status callbacks)
      tags: [Communications]
      security:
        - WebhookSignature: []
      responses:
        "200": { description: Ack. }
  /whatsapp/onboard:
    post:
      summary: Embedded-signup onboarding flow
      tags: [Communications]
      responses:
        "200": { description: Onboarding state. }
  /telephony/click-to-call:
    post:
      summary: Initiate a click-to-call session
      description: Provider-agnostic — bridges agent <-> contact via MyOperator / Knowlarity / Callified.ai.
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId]
              properties:
                contactId: { type: integer }
                agentExtension: { type: string, nullable: true }
      responses:
        "200": { description: Call queued. }
  /voice/recordings:
    get:
      summary: List call recordings
      tags: [Communications]
      responses:
        "200": { description: Recordings. }
  /voice-transcription:
    post:
      summary: Submit a recording for transcription
