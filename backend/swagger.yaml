        "200": { description: Assigned. }
        "404": { $ref: "#/components/responses/NotFound" }

  # ════════════════════════════════════════════════════════════════════
  # TENANTS — additions (brand kits)
  # ════════════════════════════════════════════════════════════════════
  /brand-kits:
    get:
      summary: List brand kits for the tenant
      description: |
        Brand kits are per-tenant (and optionally per-sub-brand for
        travel tenants) sets of brand assets — primary colour, logo
        URL, fonts, tagline. Drives the PDF / email / portal chrome.
      tags: [Tenants]
      responses:
        "200":
          description: Brand kits.
          content:
            application/json:
              schema:
                type: object
                properties:
                  brandKits:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        subBrand: { type: string, nullable: true }
                        primaryColor: { type: string }
                        logoUrl: { type: string }
                        active: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /brand-kits/by-subbrand/{subBrand}:
    get:
      summary: "[PUBLIC] Read the public-safe brand kit for a sub-brand"
      description: |
        Public surface for the customer portal + microsite + embed widget.
        Returns ONLY the public-safe fields (primaryColor, logoUrl, fonts,
        tagline). Audit metadata / version history / createdBy are
        scrubbed. Allowed under the `/brand-kits/by-subbrand/:sub` path
        because the portal login screen must carry the sub-brand chrome
        BEFORE the customer authenticates.
      tags: [Tenants]
      security: []
      parameters:
        - in: path
          name: subBrand
          required: true
          schema: { type: string, enum: [tmc, rfu, travelstall, visasure] }
      responses:
        "200":
          description: Public brand kit.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subBrand: { type: string }
                  primaryColor: { type: string }
                  accentColor: { type: string }
                  logoUrl: { type: string }
                  fonts: { type: array, items: { type: string } }
                  tagline: { type: string }
              example:
                subBrand: "tmc"
                primaryColor: "#122647"
                accentColor: "#C89A4E"
                logoUrl: "/uploads/brand/tmc-logo.png"
                tagline: "Trips that teach."
        "404": { $ref: "#/components/responses/NotFound" }
  /brand-kits/active/{subBrand}:
    get:
      summary: Read the active brand kit for a sub-brand (authenticated)
      tags: [Tenants]
      parameters:
        - in: path
          name: subBrand
          required: true
          schema: { type: string }
      responses:
        "200": { description: Active kit. }
        "404": { $ref: "#/components/responses/NotFound" }
  /brand-kits/{id}:
    get:
      summary: Read a brand kit by id
      tags: [Tenants]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Kit. }
        "404": { $ref: "#/components/responses/NotFound" }
  /brand-kits/{id}/versions:
    get:
      summary: Read a brand kit's version history
      tags: [Tenants]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Versions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions: { type: array, items: { type: object } }

  # ════════════════════════════════════════════════════════════════════
  # FINANCIAL — additions (wallet bonus rules)
  # ════════════════════════════════════════════════════════════════════
  /wallet/rules:
    get:
      summary: List wallet bonus rules
      description: |
        Per-tenant wallet top-up bonus rules (D16 slice 5b). Each rule
        defines a top-up threshold → bonus % or bonus cents mapping
        applied at wallet top-up time by `walletExpiryEngine`.
      tags: [Financial]
      responses:
        "200":
          description: Rules.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        thresholdCents: { type: integer }
                        bonusType: { type: string, enum: [percent, fixed] }
                        bonusValue: { type: integer }
                        active: { type: boolean }
              example:
                rules:
                  - id: 3
                    thresholdCents: 1000000
                    bonusType: "percent"
                    bonusValue: 10
                    active: true
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a wallet bonus rule (ADMIN)
      tags: [Financial]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [thresholdCents, bonusType, bonusValue]
              properties:
                thresholdCents: { type: integer }
                bonusType: { type: string, enum: [percent, fixed] }
                bonusValue: { type: integer }
                active: { type: boolean, default: true }
            example:
              thresholdCents: 1000000
              bonusType: "percent"
              bonusValue: 10
              active: true
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /wallet/rules/stats:
    get:
      summary: Wallet bonus rule rollup
      tags: [Financial]
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBonusAppliedCents: { type: integer }
                  ruleCounts: { type: object }
  /wallet/rules/{id}:
    put:
      summary: Update a wallet bonus rule (ADMIN)
      tags: [Financial]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                thresholdCents: { type: integer }
                bonusType: { type: string, enum: [percent, fixed] }
                bonusValue: { type: integer }
                active: { type: boolean }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a wallet bonus rule (ADMIN)
      tags: [Financial]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }

  # ════════════════════════════════════════════════════════════════════
  # WELLNESS / GENERIC — attendance + leave (cross-vertical)
  # ════════════════════════════════════════════════════════════════════
  /attendance/clock-in:
    post:
      summary: Clock the caller in
      description: |
        Records a clock-in event (start of shift) for the calling user.
        Idempotent within a 5-minute window. Cross-vertical — wellness
        clinics use it for staff attendance; generic tenants use it for
        timesheets.
      tags: [Wellness — Operations]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                locationId: { type: integer, nullable: true }
                notes: { type: string }
            example:
              locationId: 3
              notes: "Manual clock-in — biometric down"
      responses:
        "201":
          description: Clock-in recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendanceId: { type: integer }
                  clockedInAt: { type: string, format: date-time }
        "409": { description: Already clocked in. }
  /attendance/clock-out:
    post:
      summary: Clock the caller out
      tags: [Wellness — Operations]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
      responses:
        "200":
          description: Clock-out recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendanceId: { type: integer }
                  clockedOutAt: { type: string, format: date-time }
                  totalMinutes: { type: integer }
        "409": { description: Not currently clocked in. }
  /attendance/me:
    get:
      summary: Read the caller's own attendance history
      tags: [Wellness — Operations]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Attendance rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendance: { type: array, items: { type: object } }
                  total: { type: integer }
  /attendance/staff/{userId}:
    get:
      summary: Read another user's attendance (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200": { description: Attendance rows. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /attendance/summary:
    get:
      summary: Tenant attendance rollup (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  presentToday: { type: integer }
                  absentToday: { type: integer }
                  onLeaveToday: { type: integer }
  /attendance/list:
    get:
      summary: List attendance rows (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
      responses:
        "200": { description: List. }
  /attendance/by-month:
    get:
      summary: Per-month attendance rollup (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters:
        - in: query
          name: year
          schema: { type: integer }
      responses:
        "200": { description: Per-month buckets. }
  /attendance/{id}:
    put:
      summary: Edit an attendance row (ADMIN — manual correction)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clockedInAt: { type: string, format: date-time }
                clockedOutAt: { type: string, format: date-time }
                notes: { type: string }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete an attendance row (ADMIN)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /attendance/devices:
    get:
      summary: List biometric devices (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Devices.
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices: { type: array, items: { type: object } }
    post:
      summary: Register a biometric device (ADMIN)
      tags: [Wellness — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, model]
              properties:
                name: { type: string }
                model: { type: string }
                locationId: { type: integer, nullable: true }
      responses:
        "201":
          description: Device created — API key returned ONCE.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  apiKey: { type: string }
  /attendance/devices/{id}:
    put:
      summary: Update a biometric device (ADMIN)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                locationId: { type: integer, nullable: true }
                active: { type: boolean }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a biometric device (ADMIN)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /attendance/biometric/webhook:
    post:
      summary: "[PUBLIC] Biometric device → CRM clock-event ingest"
      description: |
        Public webhook for hardware biometric clock-in/out devices. Auth
        via `X-API-Key` against `BiometricDevice.apiKey` (NOT JWT). Body
        payload is the device-vendor's clock event shape.
      tags: [Wellness — Operations]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeRef, event, timestamp]
              properties:
                employeeRef:
                  {
                    type: string,
                    description: Vendor-provided employee ID; resolved to a CRM userId.,
                  }
                event: { type: string, enum: [clock_in, clock_out] }
                timestamp: { type: string, format: date-time }
      responses:
        "200": { description: Ingested. }
        "401": { description: Invalid device API key. }
  /leave/stats:
    get:
      summary: Tenant-wide leave usage rollup (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendingRequests: { type: integer }
                  approvedThisMonth: { type: integer }
  /leave/policies:
    get:
      summary: List leave policies
      description: |
        Per-tenant leave-policy definitions (annual, sick, casual,
        compensatory, unpaid). Each carries accrual cadence + carry-
        forward rules consumed by `leavePolicyEngine`.
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Policies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies: { type: array, items: { type: object } }
    post:
      summary: Create a leave policy (ADMIN)
      tags: [Wellness — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, daysPerYear]
              properties:
                name: { type: string }
                daysPerYear: { type: integer }
                accrualCadence:
                  { type: string, enum: [monthly, quarterly, yearly] }
                carryForwardMax: { type: integer, nullable: true }
      responses:
        "201": { description: Created. }
  /leave/policies/{id}:
    put:
      summary: Update a leave policy (ADMIN)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                daysPerYear: { type: integer }
                accrualCadence: { type: string }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a leave policy (ADMIN)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /leave/balances/me:
    get:
      summary: Read the caller's leave balances
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Balances.
          content:
            application/json:
              schema:
                type: object
                properties:
                  balances:
                    type: array
                    items:
                      type: object
                      properties:
                        policyId: { type: integer }
                        policyName: { type: string }
                        daysAvailable: { type: number }
                        daysUsed: { type: number }
  /leave/balances/{userId}:
    get:
      summary: Read another user's leave balances (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Balances. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /leave/requests:
    get:
      summary: List leave requests (caller's own + team's if MANAGER)
      tags: [Wellness — Operations]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: status
          schema:
            { type: string, enum: [pending, approved, rejected, cancelled] }
      responses:
        "200": { description: Requests. }
    post:
      summary: Create a leave request
      tags: [Wellness — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policyId, fromDate, toDate]
              properties:
                policyId: { type: integer }
                fromDate: { type: string, format: date }
                toDate: { type: string, format: date }
                reason: { type: string }
            example:
              policyId: 1
              fromDate: "2026-07-15"
              toDate: "2026-07-19"
              reason: "Family vacation"
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /leave/requests/{id}:
    get:
      summary: Read one leave request
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Request. }
        "404": { $ref: "#/components/responses/NotFound" }
  /leave/requests/{id}/approve:
    post:
      summary: Approve a leave request (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        "200": { description: Approved. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /leave/requests/{id}/reject:
    post:
      summary: Reject a leave request (ADMIN/MANAGER)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { description: Rejected. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /leave/requests/{id}/cancel:
    post:
      summary: Cancel a pending leave request (request owner)
      tags: [Wellness — Operations]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Cancelled. }
  /leave/policy-carry-forward/run:
    post:
      summary: Trigger leave-policy carry-forward sweep (ADMIN)
      description: Manual trigger for `leavePolicyEngine`'s carry-forward sweep — normally cron-driven 02:30 daily.
      tags: [Wellness — Operations]
      responses:
        "200": { description: Sweep complete. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /leave/availability:
    get:
      summary: Day-by-day leave availability view
      description: Returns leave-status for each user across a date range; drives the calendar overlay.
      tags: [Wellness — Operations]
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, format: date }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Availability matrix.
          content:
            application/json:
              schema:
                type: object
                properties:
                  availability: { type: array, items: { type: object } }
  /wellness/csv/{entity}/template:
    get:
      summary: Download a CSV template for a wellness entity
      description: |
        Per-entity CSV import/export surface (#816). Supported `entity`
        values: services, packages, products, customers, bookings,
        membership-plans. `template` returns an empty CSV with the
        canonical header row.
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
      responses:
        "200":
          description: text/csv template.
          content:
            text/csv: { schema: { type: string } }
  /wellness/csv/{entity}/export:
    get:
      summary: Export a wellness entity as CSV
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
      responses:
        "200":
          description: text/csv.
          content:
            text/csv: { schema: { type: string } }
  /wellness/csv/{entity}/import:
    post:
      summary: Import a wellness entity from CSV (sync)
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: integer }
                  updated: { type: integer }
                  errors: { type: array, items: { type: object } }
        "400": { $ref: "#/components/responses/ValidationError" }
  /wellness/csv/{entity}/import/async:
    post:
      summary: Import a wellness entity from CSV (async, returns jobId)
      description: For large files. Returns a `jobId` to poll via `/wellness/csv/jobs/:jobId`.
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "202":
          description: Accepted — poll jobId.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
  /wellness/csv/jobs/{jobId}:
    get:
      summary: Poll a CSV import job
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Job state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: string }
                  status:
                    { type: string, enum: [queued, running, succeeded, failed] }
                  imported: { type: integer }
                  errors: { type: array, items: { type: object } }
        "404": { $ref: "#/components/responses/NotFound" }
  /wellness/csv/{entity}:
    get:
      summary: Entity metadata for the CSV UI
      description: Returns column names, label, and per-column validation hints for the import wizard.
      tags: [Wellness — Operations]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Entity metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity: { type: string }
                  columns: { type: array, items: { type: object } }

