                  allowed:
                    type: array
                    items: { type: string }
              example:
                activeSubBrand: "tmc"
                allowed: ["tmc", "rfu", "travelstall"]
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /travel/session/switch-brand:
    post:
      summary: Switch the caller's active sub-brand
      tags: [Travel — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subBrand]
              properties:
                subBrand:
                  { type: string, enum: [tmc, rfu, travelstall, visasure] }
            example:
              subBrand: "rfu"
      responses:
        "200":
          description: Switched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeSubBrand: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403":
          description: Caller has no access to this sub-brand.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                { error: "Sub-brand access denied", code: "SUB_BRAND_DENIED" }

  # ════════════════════════════════════════════════════════════════════
  # MULTICHANNEL LEAD INTAKE (G015)
  # ════════════════════════════════════════════════════════════════════
  /leads/intake:
    post:
      summary: Canonical body-channel lead intake alias
      description: |
        Multi-channel lead intake endpoint
        (PRD_TRAVEL_MULTICHANNEL_LEADS G015). The channel is read from
        `req.body.channel` rather than the URL path; the handler forwards
        to the legacy `/api/travel/inbound/leads/:channel` so both
        surfaces share one envelope, one idempotency contract, one
        Touchpoint write, one cooldown gate.

        Accepted channels (matching the 17-channel allowlist): voyagr,
        web_form, whatsapp, ads, adsgpt, meta_ad, manual, indiamart,
        justdial, tradeindia, voice, sms, email, google_ad, linkedin_ad,
        referral, chat.

        Open / public — no JWT — but the route is rate-limited and the
        legacy handler enforces channel-specific authentication
        (e.g. signed webhooks, API keys per channel).
      tags: [Marketing]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, tenantSlug]
              properties:
                channel: { type: string, example: "voyagr" }
                tenantSlug: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                name: { type: string }
                subBrand:
                  { type: string, enum: [tmc, rfu, travelstall, visasure] }
                meta:
                  type: object
                  description: Channel-specific extra payload (formId, utmSource, etc.).
                externalRef:
                  type: string
                  description: Channel-side ID, used for idempotency.
            example:
              channel: "voyagr"
              tenantSlug: "globussoft-travel"
              email: "asha@example.com"
              phone: "+919876543210"
              name: "Asha Verma"
              subBrand: "tmc"
              externalRef: "vgr_lead_42"
      responses:
        "200":
          description: Lead ingested or de-duped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    { type: string, enum: [created, deduped, cooldown_dropped] }
                  touchpointId: { type: integer }
                  matchedRoutingRuleId: { type: integer, nullable: true }
              example:
                action: "created"
                touchpointId: 1041
                matchedRoutingRuleId: 7
        "400":
          description: Missing channel.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error: "channel is required in body for the canonical /api/leads/intake alias"
                code: "MISSING_CHANNEL"
        "429": { $ref: "#/components/responses/RateLimited" }
