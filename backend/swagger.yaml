  # ════════════════════════════════════════════════════════════════════
  # CONTACTS — additions (data enrichment)
  # ════════════════════════════════════════════════════════════════════
  /data-enrichment/providers:
    get:
      summary: List enrichment providers
      description: |
        Returns the configured data-enrichment providers (Clearbit,
        Apollo, ZoomInfo) and the per-tenant credential state.
      tags: [Contacts]
      responses:
        "200":
          description: Providers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        configured: { type: boolean }
              example:
                providers:
                  - key: "clearbit"
                    label: "Clearbit"
                    configured: false
                  - key: "apollo"
                    label: "Apollo.io"
                    configured: true
  /data-enrichment/contact/{id}:
    post:
      summary: Enrich one contact via the configured provider
      description: |
        Looks up the contact's email / domain at the active enrichment
        provider; persists discovered fields (companyName, jobTitle,
        linkedinUrl, etc.) onto the Contact row.
      tags: [Contacts]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Enriched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact: { $ref: "#/components/schemas/Contact" }
                  fieldsUpdated: { type: array, items: { type: string } }
        "404": { $ref: "#/components/responses/NotFound" }
  /data-enrichment/bulk:
    post:
      summary: Bulk-enrich a list of contacts
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactIds]
              properties:
                contactIds: { type: array, items: { type: integer } }
            example:
              contactIds: [12, 14, 88]
      responses:
        "200":
          description: Bulk summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded: { type: integer }
                  failed: { type: integer }
                  failures: { type: array, items: { type: object } }
  /data-enrichment/auto-enrich-new:
    post:
      summary: Toggle auto-enrich for newly-created contacts (ADMIN)
      description: Sets a tenant flag — when true, the workflow engine enriches every new contact.
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200": { description: Saved. }

  # ════════════════════════════════════════════════════════════════════
  # MARKETING — additions (social)
  # ════════════════════════════════════════════════════════════════════
  /social/posts:
    get:
      summary: List scheduled / published social posts
      description: |
        Cross-channel social-media post log (Twitter / X, LinkedIn,
        Facebook, Instagram). Posts can be drafted, scheduled, or
        already published.
      tags: [Marketing]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: platform
          schema:
            { type: string, enum: [twitter, linkedin, facebook, instagram] }
        - in: query
          name: status
          schema: { type: string, enum: [draft, scheduled, published, failed] }
      responses:
        "200":
          description: Posts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts: { type: array, items: { type: object } }
                  total: { type: integer }
    post:
      summary: Create a social post (draft or scheduled)
      tags: [Marketing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, body]
              properties:
                platform:
                  {
                    type: string,
                    enum: [twitter, linkedin, facebook, instagram],
                  }
                body: { type: string }
                mediaUrls: { type: array, items: { type: string, format: uri } }
                scheduledFor:
                  { type: string, format: date-time, nullable: true }
            example:
              platform: "twitter"
              body: "Launch day — check it out!"
              scheduledFor: "2026-06-21T10:00:00Z"
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /social/posts/{id}/publish:
    post:
      summary: Publish a draft / scheduled post now
      tags: [Marketing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Published.
          content:
            application/json:
              schema:
                type: object
                properties:
                  publishedAt: { type: string, format: date-time }
                  externalPostId: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
  /social/posts/{id}:
    delete:
      summary: Delete a social post
      tags: [Marketing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /social/mentions:
    get:
      summary: List inbound social mentions
      tags: [Marketing]
      responses:
        "200":
          description: Mentions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mentions: { type: array, items: { type: object } }
                  total: { type: integer }
  /social/mentions/fetch/{platform}:
    post:
      summary: Fetch fresh mentions from the connected platform
      tags: [Marketing]
      parameters:
        - in: path
          name: platform
          required: true
          schema:
            { type: string, enum: [twitter, linkedin, facebook, instagram] }
      responses:
        "200":
          description: Mentions ingested.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fetched: { type: integer }
  /social/mentions/{id}/link-contact:
    post:
      summary: Link a mention to a contact
      tags: [Marketing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId]
              properties:
                contactId: { type: integer }
      responses:
        "200": { description: Linked. }
  /social/accounts:
    get:
      summary: List connected social accounts
      tags: [Marketing]
      responses:
        "200":
          description: Accounts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        platform: { type: string }
                        username: { type: string }
                        connectedAt: { type: string, format: date-time }
  /social/accounts/{platform}/connect:
    post:
      summary: Connect a social account (OAuth callback handler)
      tags: [Marketing]
      parameters:
        - in: path
          name: platform
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oauthCode]
              properties:
                oauthCode: { type: string }
      responses:
        "200": { description: Connected. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /social/accounts/{platform}:
    delete:
      summary: Disconnect a social account
      tags: [Marketing]
      parameters:
        - in: path
          name: platform
          required: true
          schema: { type: string }
      responses:
        "204": { description: Disconnected. }

  # ════════════════════════════════════════════════════════════════════
  # SERVICE & SUPPORT — additions
