  # ════════════════════════════════════════════════════════════════════
  # ════ TRAVEL VERTICAL ════
  # ════════════════════════════════════════════════════════════════════
  /travel/health:
    get:
      summary: "[TRAVEL] Vertical health probe + tenant identity"
      description: |
        Day-1 sanity check used by the SPA to confirm the travel module is
        wired correctly end-to-end. Requires the caller's tenant to have
        `vertical === 'travel'`.
      tags: [Travel — Operations]
      responses:
        "200":
          description: Healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "healthy" }
                  vertical: { type: string, example: "travel" }
                  tenantId: { type: integer }
                  tenantSlug: { type: string }
                  tenantName: { type: string }
                  phase: { type: string, example: "1-day-1-scaffolding" }
                  timestamp: { type: string, format: date-time }
        "403": { $ref: "#/components/responses/Forbidden" }
  /travel/utils/validate-gstin:
    get:
      summary: "[TRAVEL] Validate / lookup an Indian GSTIN"
      description: |
        Operator-facing lookup wrapping `lib/gstinValidator.js`. No side
        effects; ADMIN+MANAGER gate.

        Returns 200 on both valid AND invalid inputs — the route's job is
        to **report** validity, not to gate on it.
      tags: [Travel — Operations]
      parameters:
        - in: query
          name: gstin
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lookup result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gstin: { type: string, description: Normalised uppercase. }
                  valid: { type: boolean }
                  stateName: { type: string, nullable: true }
                  stateCode: { type: string, nullable: true }
                  errors:
                    type: array
                    items:
                      {
                        type: string,
                        enum:
                          [
                            INVALID_FORMAT,
                            INVALID_STATE_CODE,
                            INVALID_CHECKSUM,
                          ],
                      }

  /travel/session/sub-brand:
    get:
      summary: "[TRAVEL] Get the active sub-brand for the caller's session"
      tags: [Travel — Operations]
      responses:
        "200":
          description: Active sub-brand.
          content:
            application/json:
              schema:
                type: object
                properties:
                  subBrand:
                    { type: string, enum: [tmc, rfu, travelstall, visasure] }
    post:
      summary: "[TRAVEL] Switch active sub-brand for the session"
      tags: [Travel — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subBrand]
              properties:
                subBrand:
                  { type: string, enum: [tmc, rfu, travelstall, visasure] }
      responses:
        "200": { description: Switched. }
        "403":
          description: User's `subBrandAccess` does not include the requested sub-brand.

