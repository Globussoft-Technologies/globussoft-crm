  # AI
  # ════════════════════════════════════════════════════════════════════
  /ai/chat:
    post:
      summary: Send a chat completion to the configured AI provider (Gemini 2.5)
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string, enum: [system, user, assistant] }
                      content: { type: string }
                model: { type: string, default: "gemini-2.5-flash" }
                tenantContext:
                  {
                    type: boolean,
                    description: Inject tenant + vertical context.,
                  }
      responses:
        "200":
          description: Completion.
          content:
            application/json:
              schema:
                type: object
                properties:
                  text: { type: string }
                  tokens:
                    type: object
                    properties:
                      input: { type: integer }
                      output: { type: integer }
        "402":
          description: Budget cap exceeded for this tenant for this month.
  /ai_scoring/recalculate:
    post:
      summary: Recalculate AI lead scores
      tags: [AI]
      responses:
        "200": { description: Recalculated. }
  /deal-insights:
    get:
      summary: List Gemini-generated deal insights
      tags: [AI]
      responses:
        "200": { description: Insights. }
  /sentiment/{type}/{id}:
    parameters:
      - in: path
        name: type
        required: true
        schema: { type: string, enum: [contact, ticket, patient] }
      - $ref: "#/components/parameters/IdPath"
    get:
      summary: Get latest sentiment score for an entity
      tags: [AI]
      responses:
        "200": { description: Sentiment. }

