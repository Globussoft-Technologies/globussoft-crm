  # ════════════════════════════════════════════════════════════════════
  # ADMIN & PLATFORM
  # ════════════════════════════════════════════════════════════════════
  /audit:
    get:
      summary: List audit-log entries
      description: |
        Tamper-evident hash-chain audit log. `integrityVerified` and
        `unhashedRows` are reported by `GET /audit/verify`.
      tags: [Admin & Platform]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: actorUserId
          schema: { type: integer }
        - in: query
          name: entityType
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200": { description: Audit rows. }
  /audit/verify:
    get:
      summary: Verify the audit hash-chain integrity
      tags: [Admin & Platform]
      responses:
        "200":
          description: Integrity result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  integrityVerified: { type: boolean }
                  unhashedRows: { type: integer }
                  brokenAt: { type: integer, nullable: true }
                  reason: { type: string, nullable: true }
  /audit/backfill:
    post:
      summary: Backfill missing hash-chain rows (ADMIN)
      tags: [Admin & Platform]
      responses:
        "200": { description: Backfill complete. }
  /gdpr/export:
    post:
      summary: Export all personal data for a contact / patient (GDPR DSAR)
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contactId: { type: integer, nullable: true }
                patientId: { type: integer, nullable: true }
      responses:
        "202": { description: Export queued; emailed when ready. }
  /gdpr/delete:
    post:
      summary: Hard-delete personal data after a DSAR request
      description: Step-up auth required. Cascades through audit chain + maintains hash integrity.
      tags: [Admin & Platform]
      responses:
        "200": { description: Deletion complete. }
  /field-permissions:
    get:
      summary: List field-level permission rules
      tags: [Admin & Platform]
      responses:
        "200": { description: Rules. }
  /sandbox/snapshots:
    get:
      summary: List sandbox snapshots
      tags: [Admin & Platform]
      responses:
        "200": { description: Snapshots. }
  /industry-templates:
    get:
      summary: List industry-specific config templates
      tags: [Admin & Platform]
      responses:
        "200": { description: Templates. }
  /security/reports:
    get:
      summary: Get security-event reports
      tags: [Admin & Platform]
      responses:
        "200": { description: Security reports. }
  /developer/agent-activity:
    post:
      summary: Append an agent-activity log entry (Developer page live view)
      description: Used by background agents + cron-fired workflows to publish progress to the Developer page.
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent, status, message]
              properties:
                agent: { type: string }
                status:
                  { type: string, enum: [started, progress, completed, failed] }
                message: { type: string }
      responses:
        "201": { description: Logged. }
  /admin/trigger-engine:
    post:
      summary: Manually trigger a cron engine for this tenant (ADMIN)
      description: |
        Pattern endpoint shared by every cron engine that supports manual
        trigger (G-9/G-10/G-11/G-12/G-14/G-15 spec class). Body specifies
        which engine to run.
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [engine]
              properties:
                engine:
                  type: string
                  enum:
                    - lead_scoring
                    - sequence
                    - marketplace
                    - workflow
                    - campaign
                    - report
                    - recurring_invoice
                    - forecast_snapshot
                    - deal_insights
                    - sentiment
                    - scheduled_email
                    - retention
                    - backup
                    - orchestrator
                    - appointment_reminders
                    - wellness_ops
                    - sla_breach
                    - lead_sla
                    - low_stock
                    - leave_policy
                    - demo_hygiene
                    - audit_integrity
                confirmDestructive:
                  type: boolean
                  description: Required for `retention` + `demo_hygiene` engines (data-destroying).
      responses:
        "200": { description: Engine run summary. }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ════════════════════════════════════════════════════════════════════
  # ════ WELLNESS VERTICAL ════
  # ════════════════════════════════════════════════════════════════════
  /wellness/dashboard:
    get:
      summary: "[WELLNESS] Owner-dashboard KPIs"
      description: |
        Returns the wellness owner-dashboard payload — today's revenue,
        booked vs walk-ins, no-show rate, top services, top doctors,
        AI recommendations from the orchestrator engine.

        **Tenant gate:** `tenant.vertical === 'wellness'`.
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Dashboard payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  todayRevenueCents: { type: integer }
                  todayVisits: { type: integer }
                  noShowRate: { type: number }
                  topServices:
                    type: array
                    items: { type: object }
                  recommendations:
                    type: array
                    items: { $ref: "#/components/schemas/AgentRecommendation" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /wellness/recommendations:
    get:
      summary: "[WELLNESS] List orchestrator-generated recommendations"
      tags: [Wellness — Operations]
      responses:
        "200":
          description: Recommendations.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentRecommendation" }
  /wellness/recommendations/{id}/dismiss:
    parameters:
