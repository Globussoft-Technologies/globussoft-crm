openapi: 3.0.3
info:
  title: Globussoft Enterprise CRM API
  version: 3.9.3
  description: Multi-tenant CRM serving generic, wellness, and travel verticals from one codebase. Bearer JWT auth on most endpoints; partner integrations use `X-API-Key` on `/v1/external/*`.
servers:
  - url: http://localhost:5000/api
    description: Local
  - url: https://crm.globusdemos.com/api
    description: Demo
  - url: https://globuscrm.globussoft.com/api
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Platform
    description: Health, version, platform meta.
  - name: Auth
    description: Login, signup, 2FA, password reset, SSO, SCIM.
  - name: Users & Roles
    description: User management, RBAC, current session, preferences.
  - name: Tenants
    description: Tenant CRUD, settings, brand kits, sub-brand themes.
  - name: Contacts
    description: Address book — leads, prospects, customers, churned.
  - name: Deals
    description: Pipeline deals — stages, won/lost, insights, timeline.
  - name: Pipelines & Stages
    description: Pipeline + stage CRUD and ordering.
  - name: Marketing
    description: Campaigns, sequences, A/B tests, attribution, landing pages.
  - name: Communications
    description: Email, SMS, WhatsApp, voice, push, shared inbox, live chat.
  - name: Financial
    description: Invoices, payments, estimates, expenses, wallet, POS.
  - name: Service & Support
    description: Tickets, SLA, knowledge base, surveys, portal.
  - name: Documents
    description: Templates, e-signatures, document views, file uploads.
  - name: Analytics
    description: Reports, dashboards, forecasting, quotas, funnel.
  - name: Automation
    description: Workflows, approvals, lead routing, territories.
  - name: AI
    description: Gemini-powered scoring, insights, sentiment, chat.
  - name: Integrations
    description: Marketplace inbound, Zapier, calendar sync, SSO, SCIM.
  - name: Admin & Platform
    description: Audit log, GDPR, field permissions, sandbox, developer.
  - name: Wellness — Patients & PHI
    description: "[Wellness] Patient records, tags, activities. PHI-gated."
  - name: Wellness — Visits & Clinical
    description: "[Wellness] Visits, prescriptions, consents, treatment plans."
  - name: Wellness — Catalog & Inventory
    description: "[Wellness] Services, drugs, inventory, block times."
  - name: Wellness — Operations
    description: "[Wellness] Dashboard, recommendations, reports, telecaller queue."
  - name: Wellness — Portal & Public
    description: "[Wellness] Patient portal, public booking, clinic page."
  - name: Travel — Trips & Itineraries
    description: "[Travel] TMC trips, participants, itineraries, share tokens."
  - name: Travel — Visa & Documents
    description: "[Travel] Visa Sure — applications, embassy rules, passports."
  - name: Travel — Suppliers & Pricing
    description: "[Travel] Suppliers, cost master, pricing engine, commissions."
  - name: Travel — Microsites & Marketing
    description: "[Travel] Microsites, flyers, religious packets, sightseeing."
  - name: Travel — Quotes & Billing
    description: "[Travel] Quotes, invoices, trip billing, RFU profiles."
  - name: Travel — Diagnostics & Sales
    description: "[Travel] TMC readiness diagnostic, lead quality, sales brief."
  - name: Travel — Operations
    description: "[Travel] Dashboard, reports, CSV I/O, inbound leads, web check-in."
  - name: Travel — Sub-Brand Integrations
    description: "[Travel] RateHawk, AdsGPT, Callified.ai, Booking-Expedia, TMC catalogue."
  - name: External Partner API
    description: API-key surface for sister Globussoft products (`/v1/external/*`).
  - name: Public
    description: Unauthenticated — webhooks, public booking, share-token views.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `POST /api/auth/login`. Payload contains `userId`,
        `tenantId`, `role`. Pass as `Authorization: Bearer <token>`.
        Token is valid for 7 days.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        External-partner API key (prefix `glbs_`). Issued out-of-band per
        partner integration. Used only on `/api/v1/external/*` routes.
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: |
        HMAC-SHA256 signature of the raw request body, hex-encoded. Used
        on inbound webhook endpoints (marketplace leads, WhatsApp,
        payment-gateway callbacks).
  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
      description: 1-indexed page number (list endpoints).
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      description: Page size (list endpoints).
    Search:
      in: query
      name: q
      schema: { type: string }
      description: Free-text search (most list endpoints).
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
      description: Numeric primary key.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Authentication required"
            code: "AUTH_REQUIRED"
    Forbidden:
      description: Authenticated but lacking required role / vertical / scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Insufficient permissions"
            code: "ROLE_DENIED"
    NotFound:
      description: Resource not found in this tenant scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Not found"
            code: "RESOURCE_NOT_FOUND"
    ValidationError:
      description: Request payload failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    RateLimited:
      description: Rate limit exceeded (general 5000/15min, auth 1000/15min).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Too many requests"
            code: "RATE_LIMITED"
    Created:
      description: Resource created successfully.
  schemas:
    # ─── Shared envelope ──────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error: { type: string, example: "Endpoint not found" }
        code: { type: string, example: "API_ROUTE_NOT_FOUND" }
        path: { type: string, example: "/api/foo" }
        method: { type: string, example: "GET" }
    ValidationErrorResponse:
      type: object
      properties:
        error: { type: string, example: "Validation failed" }
        code: { type: string, example: "VALIDATION_ERROR" }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string, example: "email" }
              message: { type: string, example: "must be a valid email" }
    PaginatedEnvelope:
      type: object
      properties:
        items:
          type: array
          items: { type: object }
        total: { type: integer, example: 142 }
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 50 }
        hasMore: { type: boolean, example: true }
    AuditMeta:
      type: object
      description: Tenant-scoped audit fields stamped on every record.
      properties:
        tenantId: { type: integer, readOnly: true }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }
        createdById: { type: integer, readOnly: true, nullable: true }

    # ─── Auth ─────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "admin@globussoft.com" }
        password: { type: string, format: password, example: "password123" }
        rememberMe: { type: boolean, default: false }
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token; include in `Authorization` header.
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"
        tenant:
          $ref: "#/components/schemas/Tenant"
    SignupRequest:
      type: object
      required: [email, password, name, companyName]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        name: { type: string }
        companyName: { type: string }
        vertical:
          type: string
          enum: [generic, wellness, travel]
          default: generic
        country: { type: string, example: "IN" }
        defaultCurrency: { type: string, example: "INR" }
    TwoFactorEnableRequest:
      type: object
      properties:
        password: { type: string, format: password }
    TwoFactorEnableResponse:
      type: object
      properties:
        secret: { type: string, description: TOTP shared secret. }
        otpauthUrl:
          { type: string, description: otpauth:// URI for QR provisioning. }
        recoveryCodes:
          type: array
          items: { type: string }
    TwoFactorVerifyRequest:
      type: object
      required: [token]
      properties:
        token: { type: string, example: "123456" }

    # ─── Core entities ────────────────────────────────────────────────
    User:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [ADMIN, MANAGER, USER] }
        wellnessRole:
          type: string
          nullable: true
          enum: [doctor, professional, telecaller, helper, null]
          description: Wellness-vertical only.
        tenantId: { type: integer, readOnly: true }
        isActive: { type: boolean, default: true }
        twoFactorEnabled: { type: boolean, readOnly: true }
        subBrandAccess:
          type: array
          description: Travel-vertical only — which sub-brands this user can act on.
          items:
            type: string
            enum: [tmc, rfu, travelstall, visasure]
        createdAt: { type: string, format: date-time, readOnly: true }
    Tenant:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string, example: "Globussoft Demo" }
        slug: { type: string, example: "globussoft-demo" }
        vertical:
          type: string
          enum: [generic, wellness, travel]
          description: Drives sidebar, theme, landing route, currency defaults.
        country: { type: string, example: "IN" }
        defaultCurrency: { type: string, example: "INR" }
        locale: { type: string, example: "en-IN" }
        timezone: { type: string, example: "Asia/Kolkata" }
        createdAt: { type: string, format: date-time, readOnly: true }
    Contact:
      type: object
      required: [name]
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        company: { type: string, nullable: true }
        title: { type: string, nullable: true }
        status:
          type: string
          enum: [Lead, Prospect, Customer, Churned]
          default: Lead
        ownerId: { type: integer, nullable: true }
        leadScore: { type: integer, nullable: true, minimum: 0, maximum: 100 }
        source: { type: string, nullable: true, example: "IndiaMART" }
        tags:
          type: array
          items: { type: string }
        deletedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Deal:
      type: object
      required: [title, value]
      properties:
        id: { type: integer, readOnly: true }
        title: { type: string }
        value: { type: number, format: float, example: 25000.00 }
        currency: { type: string, example: "USD" }
        stageId: { type: integer, description: Foreign key into PipelineStage. }
        pipelineId: { type: integer }
        contactId: { type: integer, nullable: true }
        ownerId: { type: integer, nullable: true }
        status:
          type: string
          enum: [open, won, lost]
          default: open
        winProbability:
          { type: integer, minimum: 0, maximum: 100, nullable: true }
        expectedCloseDate: { type: string, format: date, nullable: true }
        wonAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        lostAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        lostReason: { type: string, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Pipeline:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string, example: "Sales Pipeline" }
        isDefault: { type: boolean }
        stages:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStage"
    PipelineStage:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string, example: "Qualified" }
        order: { type: integer }
        winProbability: { type: integer, minimum: 0, maximum: 100 }
        pipelineId: { type: integer }

    # ─── Marketing ───────────────────────────────────────────────────
    Campaign:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        channel: { type: string, enum: [email, sms, whatsapp, push, multi] }
        status:
          type: string
          enum: [draft, scheduled, running, paused, completed, archived]
        audienceFilter:
          type: object
          description: JSON filter — see `lib/audienceFilter.js`.
        scheduledFor: { type: string, format: date-time, nullable: true }
        sent: { type: integer, readOnly: true }
        opened: { type: integer, readOnly: true }
        clicked: { type: integer, readOnly: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Sequence:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        isActive: { type: boolean }
        triggerType: { type: string, enum: [manual, event, schedule] }
        steps:
          type: array
          items:
            type: object
            properties:
              delayMinutes: { type: integer }
              channel: { type: string, enum: [email, sms, whatsapp, task] }
              templateId: { type: integer, nullable: true }
              conditionJson:
                { type: string, description: JSON-encoded condition tree. }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── Communications ──────────────────────────────────────────────
    EmailMessage:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        to:
          type: array
          items: { type: string, format: email }
        subject: { type: string }
        body: { type: string, description: HTML body. Sanitized server-side. }
        scheduledFor: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum:
            [draft, queued, sent, delivered, opened, clicked, bounced, failed]
        threadId: { type: string, nullable: true }
        templateId: { type: integer, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    SmsMessage:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        to: { type: string, example: "+919999999999" }
        body: { type: string, maxLength: 1600 }
        provider: { type: string, enum: [twilio, msg91] }
        status: { type: string, enum: [queued, sent, delivered, failed] }
        senderId: { type: string, maxLength: 6, nullable: true }
        providerMessageId: { type: string, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    WhatsAppMessage:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        to: { type: string, description: E.164 phone number. }
        templateName: { type: string, nullable: true }
        body: { type: string }
        mediaUrl: { type: string, nullable: true }
        status: { type: string, enum: [queued, sent, delivered, read, failed] }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Notification:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        userId: { type: integer }
        title: { type: string }
        body: { type: string }
        link: { type: string, nullable: true }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time, readOnly: true }

    # ─── Workflow / Automation ───────────────────────────────────────
    Workflow:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        triggerEvent: { type: string, example: "contact.created" }
        conditions:
          type: object
          description: JSON condition tree evaluated by `workflowEngine`.
        actions:
          type: array
          items:
            type: object
            properties:
              type: { type: string, example: "send_email" }
              params: { type: object }
        isActive: { type: boolean }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── Tickets ─────────────────────────────────────────────────────
    Ticket:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        ticketNumber: { type: string, readOnly: true, example: "TKT-0042" }
        subject: { type: string }
        body: { type: string }
        priority: { type: string, enum: [low, medium, high, urgent] }
        status: { type: string, enum: [open, pending, resolved, closed] }
        contactId: { type: integer, nullable: true }
        assigneeId: { type: integer, nullable: true }
        slaPolicyId: { type: integer, nullable: true }
        slaBreachedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        firstResponseAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        resolvedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── Reports ─────────────────────────────────────────────────────
    Report:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        type: { type: string, enum: [revenue, pipeline, activity, custom] }
        filtersJson: { type: string }
        scheduleCron: { type: string, nullable: true }
        recipients:
          type: array
          items: { type: string, format: email }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── Financial ───────────────────────────────────────────────────
    Invoice:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        invoiceNumber:
          { type: string, readOnly: true, example: "INV-2026-0142" }
        contactId: { type: integer, nullable: true }
        dealId: { type: integer, nullable: true }
        amount: { type: number, format: float }
        tax: { type: number, format: float, default: 0 }
        total: { type: number, format: float }
        currency: { type: string, example: "INR" }
        status:
          type: string
          enum: [draft, sent, partial, paid, overdue, void, refunded]
        dueDate: { type: string, format: date }
        paidAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        recurring:
          type: boolean
          default: false
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    InvoiceLineItem:
      type: object
      properties:
        description: { type: string }
        quantity: { type: number, format: float, example: 1 }
        unitPrice: { type: number, format: float }
        taxRate: { type: number, format: float, default: 0 }
        amount: { type: number, format: float, readOnly: true }
    Payment:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        invoiceId: { type: integer }
        amount: { type: number, format: float }
        currency: { type: string }
        gateway:
          type: string
          enum: [manual, stripe, razorpay, paypal, bank_transfer]
        gatewayChargeId: { type: string, nullable: true }
        status: { type: string, enum: [pending, succeeded, failed, refunded] }
        paidAt: { type: string, format: date-time }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── Wellness vertical ───────────────────────────────────────────
    Patient:
      type: object
      description: "[WELLNESS] Patient (clinical-record subject). PII fields are AES-256-GCM encrypted at rest when `WELLNESS_FIELD_KEY` is set."
      properties:
        id: { type: integer, readOnly: true }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        email: { type: string, format: email, nullable: true }
        dob: { type: string, format: date, nullable: true }
        gender:
          {
            type: string,
            enum: [male, female, other, prefer_not_to_say],
            nullable: true,
          }
        locationId:
          { type: integer, nullable: true, description: Multi-clinic support. }
        primaryDoctorId: { type: integer, nullable: true }
        leadSource: { type: string, nullable: true }
        leadScore: { type: integer, nullable: true }
        leadStatus:
          {
            type: string,
            enum: [new, contacted, qualified, junk, lost, converted],
            default: new,
          }
        tags:
          type: array
          items: { type: string }
        consentMarketing: { type: boolean }
        notes: { type: string, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Visit:
      type: object
      description: "[WELLNESS] A booked or completed clinical visit (appointment)."
      properties:
        id: { type: integer, readOnly: true }
        patientId: { type: integer }
        doctorId: { type: integer, nullable: true }
        professionalId: { type: integer, nullable: true }
        locationId: { type: integer }
        serviceId: { type: integer, nullable: true }
        visitDate: { type: string, format: date-time }
        durationMinutes: { type: integer, default: 30 }
        status:
          type: string
          enum:
            [
              booked,
              confirmed,
              checked_in,
              in_consultation,
              completed,
              cancelled,
              no_show,
            ]
        chiefComplaint: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        chargeAmount: { type: number, format: float, nullable: true }
        npsScore: { type: integer, nullable: true, minimum: 0, maximum: 10 }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Prescription:
      type: object
      description: "[WELLNESS] Doctor / clinician-only resource."
      properties:
        id: { type: integer, readOnly: true }
        patientId: { type: integer }
        visitId: { type: integer, nullable: true }
        prescriberId:
          {
            type: integer,
            description: Must be a User with clinical wellnessRole.,
          }
        items:
          type: array
          items:
            type: object
            properties:
              drugId: { type: integer, nullable: true }
              drugName: { type: string }
              dosage: { type: string, example: "500mg" }
              frequency: { type: string, example: "BID" }
              duration: { type: string, example: "7 days" }
              instructions: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        pdfUrl: { type: string, readOnly: true, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    ConsentForm:
      type: object
      description: "[WELLNESS] Procedure consent with embedded patient signature (base64 PNG)."
      properties:
        id: { type: integer, readOnly: true }
        patientId: { type: integer }
        visitId: { type: integer, nullable: true }
        formType: { type: string, example: "aesthetic_treatment_consent" }
        bodyMarkdown: { type: string }
        signatureBase64:
          { type: string, description: PNG data URI of patient signature. }
        signedAt: { type: string, format: date-time, readOnly: true }
        witnessUserId: { type: integer, nullable: true }
        pdfUrl: { type: string, readOnly: true, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TreatmentPlan:
      type: object
      description: "[WELLNESS] Multi-visit clinical plan."
      properties:
        id: { type: integer, readOnly: true }
        patientId: { type: integer }
        title: { type: string }
        diagnosis: { type: string, nullable: true }
        sessionsPlanned: { type: integer }
        sessionsCompleted: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
        status: { type: string, enum: [active, paused, completed, cancelled] }
        items:
          type: array
          items:
            type: object
            properties:
              serviceId: { type: integer }
              quantity: { type: integer }
              completed: { type: integer }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    Service:
      type: object
      description: "[WELLNESS] A clinic-provided service (catalog entry). Can be standalone or grouped into a Package."
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        sku: { type: string, nullable: true }
        categoryId: { type: integer, nullable: true }
        priceCents: { type: integer }
        durationMinutes: { type: integer }
        isPackage: { type: boolean }
        packageItems:
          type: array
          items:
            type: object
            properties:
              serviceId: { type: integer }
              quantity: { type: integer }
        active: { type: boolean, default: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    AgentRecommendation:
      type: object
      description: "[WELLNESS] Daily AI-generated owner-dashboard recommendation card. Produced by `orchestratorEngine`."
      properties:
        id: { type: integer, readOnly: true }
        category: { type: string, example: "revenue_opportunity" }
        title: { type: string }
        body: { type: string }
        impactCents: { type: integer, nullable: true }
        cta:
          type: object
          properties:
            label: { type: string }
            href: { type: string }
        dismissedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time, readOnly: true }

    # ─── Travel vertical ─────────────────────────────────────────────
    TravelTrip:
      type: object
      description: "[TRAVEL][TMC] A school / corporate trip — the parent record for participants, accommodation, transport, billing."
      properties:
        id: { type: integer, readOnly: true }
        subBrand:
          type: string
          enum: [tmc, rfu, travelstall, visasure]
        title: { type: string, example: "DPS Year 10 — Manali Adventure" }
        schoolName: { type: string, nullable: true }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        destinationSummary: { type: string, nullable: true }
        participantCount: { type: integer, default: 0 }
        status:
          type: string
          enum: [enquiry, quoted, confirmed, in_progress, completed, cancelled]
        leadAdvisorId: { type: integer, nullable: true }
        priceCents: { type: integer, nullable: true }
        currency: { type: string, example: "INR" }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelItinerary:
      type: object
      description: "[TRAVEL] Day-by-day itinerary attached to a trip or sent standalone to a lead."
      properties:
        id: { type: integer, readOnly: true }
        subBrand: { type: string, enum: [tmc, rfu, travelstall, visasure] }
        title: { type: string }
        contactId: { type: integer, nullable: true }
        tripId: { type: integer, nullable: true }
        days:
          type: array
          items:
            type: object
            properties:
              dayNumber: { type: integer }
              date: { type: string, format: date, nullable: true }
              items:
                type: array
                items:
                  $ref: "#/components/schemas/TravelItineraryItem"
        totalPriceCents: { type: integer }
        currency: { type: string, example: "INR" }
        status:
          type: string
          enum: [draft, sent, accepted, rejected, expired]
        shareToken:
          { type: string, readOnly: true, description: Public-view token. }
        sharedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        acceptedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelItineraryItem:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        itemType:
          {
            type: string,
            enum: [flight, hotel, transfer, activity, meal, note],
          }
        description: { type: string }
        location: { type: string, nullable: true }
        startTime: { type: string, format: date-time, nullable: true }
        endTime: { type: string, format: date-time, nullable: true }
        supplierId: { type: integer, nullable: true }
        priceCents: { type: integer, default: 0 }
    TravelQuote:
      type: object
      description: "[TRAVEL] A formal price quote sent to a lead, with public share-token surface."
      properties:
        id: { type: integer, readOnly: true }
        contactId: { type: integer }
        subBrand: { type: string, enum: [tmc, rfu, travelstall, visasure] }
        itineraryId: { type: integer, nullable: true }
        totalCents: { type: integer }
        currency: { type: string }
        validUntil: { type: string, format: date }
        status:
          { type: string, enum: [draft, sent, accepted, rejected, expired] }
        shareToken: { type: string, readOnly: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelInvoice:
      type: object
      description: |
        [TRAVEL] Customer-facing invoice issued by a travel sub-brand. Distinct
        from the generic CRM `Invoice` schema — different status enum
        (Draft|Issued|Partial|Paid|Voided, capitalised), tenant-scoped
        `invoiceNum` of form `TINV-YYYY-NNNN` reassigned to `<SUBBRAND>/YY-YY/NNNN`
        on Issue, and travel-specific tax columns (TCS Sec 206C, docType
        taxonomy, parentInvoiceId for credit-/debit-note adjustment trail,
        cancellationPolicyId for refund-tier resolution at void-time).
      properties:
        id: { type: integer, readOnly: true }
        tenantId: { type: integer, readOnly: true }
        subBrand: { type: string, enum: [tmc, rfu, travelstall, visasure] }
        contactId: { type: integer }
        quoteId:
          {
            type: integer,
            nullable: true,
            description: "Optional source TravelQuote; null for direct-billing or supplier-passthrough.",
          }
        invoiceNum:
          {
            type: string,
            example: "TINV-2026-0001",
            readOnly: true,
            description: "Reassigned to per-sub-brand serial (e.g. TMC/26-27/0001) on POST /:id/issue.",
          }
        status:
          {
            type: string,
            enum: [Draft, Issued, Partial, Paid, Voided],
            default: Draft,
          }
        docType:
          type: string
          enum: [Proforma, TaxInvoice, CreditNote, DebitNote, TravelVoucher]
          nullable: true
          default: TaxInvoice
          description: "NULL on pre-slice-11 rows; route layer treats NULL as TaxInvoice."
        totalAmount: { type: number, format: float, nullable: true }
        currency: { type: string, example: "INR" }
        dueDate: { type: string, format: date, nullable: true }
        paidAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        tcsAmount:
          {
            type: number,
            format: float,
            nullable: true,
            description: "Section 206C(1G) TCS amount (additive once applied).",
          }
        tcsRate: { type: number, format: float, nullable: true }
        tcsExceedingAmount: { type: number, format: float, nullable: true }
        tcsAppliedAt:
          {
            type: string,
            format: date-time,
            nullable: true,
            readOnly: true,
            description: "Idempotency sentinel for POST /:id/apply-tcs.",
          }
        parentInvoiceId:
          {
            type: integer,
            nullable: true,
            description: "Self-FK linking a CreditNote/DebitNote back to its original TaxInvoice.",
          }
        cancellationPolicyId:
          {
            type: integer,
            nullable: true,
            description: "Optional FK; NULL falls back to sub-brand default at cancel-time.",
          }
        lines:
          type: array
          description: "Only present when GET /:id is called with ?include=lines."
          items: { $ref: "#/components/schemas/TravelInvoiceLine" }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelInvoiceLine:
      type: object
      description: "[TRAVEL] Line item under TravelInvoice. `amount` is server-derived (quantity * unitPrice) at write time."
      properties:
        id: { type: integer, readOnly: true }
        invoiceId: { type: integer }
        lineType:
          type: string
          enum:
            [
              per_pax,
              per_room,
              per_night,
              per_trip,
              tax,
              fee,
              addon,
              tcs,
              tds,
              other,
            ]
          default: other
        description: { type: string }
        quantity: { type: integer, default: 1 }
        unitPrice: { type: number, format: float }
        amount: { type: number, format: float, readOnly: true }
        sortOrder: { type: integer, nullable: true }
    VisaApplication:
      type: object
      description: "[TRAVEL][Visa Sure] A visa case being processed for a contact."
      properties:
        id: { type: integer, readOnly: true }
        contactId: { type: integer }
        country: { type: string, example: "USA" }
        visaType: { type: string, example: "B1/B2 tourist" }
        applicationDate: { type: string, format: date }
        appointmentDate: { type: string, format: date, nullable: true }
        status:
          type: string
          enum:
            [
              intake,
              document_collection,
              application_filed,
              appointment_booked,
              biometrics_done,
              decision_pending,
              approved,
              rejected,
              withdrawn,
            ]
        notes: { type: string, nullable: true }
        checklist:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              required: { type: boolean }
              done: { type: boolean }
              fileUrl: { type: string, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelSupplier:
      type: object
      description: "[TRAVEL] Hotel / airline / ground-handler / DMC supplier. Credentials are stored encrypted in a vault row."
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        type:
          {
            type: string,
            enum:
              [
                hotel,
                airline,
                ground_handler,
                dmc,
                restaurant,
                activity,
                other,
              ],
          }
        country: { type: string, nullable: true }
        contactEmail: { type: string, format: email, nullable: true }
        contactPhone: { type: string, nullable: true }
        gstin: { type: string, nullable: true }
        commissionPercent: { type: number, format: float, nullable: true }
        active: { type: boolean, default: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelPurchaseOrder:
      type: object
      description: |
        [TRAVEL] Supplier purchase order — first-class PO ledger sitting
        between a TravelSupplier and a TravelSupplierPayable
        (PRD_TRAVEL_SUPPLIER_MASTER G035/G036/G037). PO numbers follow
        TPO-YYYY-NNNN per-tenant per-year. State machine:
        draft → sent → acknowledged → fulfilled (with cancelled as
        terminal sink from draft/sent/acknowledged).
      properties:
        id: { type: integer, readOnly: true }
        poNumber: { type: string, example: "TPO-2026-0014" }
        status:
          {
            type: string,
            enum: [draft, sent, acknowledged, fulfilled, cancelled],
          }
        supplierId: { type: integer }
        bookingId: { type: integer, nullable: true }
        currency: { type: string, example: "INR" }
        notes: { type: string, nullable: true }
        subtotal:
          { type: string, description: Decimal-as-string for precision. }
        taxAmount: { type: string }
        totalAmount: { type: string }
        sentAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        acknowledgedAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        fulfilledAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        cancelledAt:
          { type: string, format: date-time, nullable: true, readOnly: true }
        cancelReason: { type: string, nullable: true, readOnly: true }
        createdBy: { type: integer, readOnly: true }
        lines:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              lineType: { type: string, enum: [service, tax, fee, discount] }
              description: { type: string }
              quantity: { type: string }
              unitPrice: { type: string }
              lineTotal: { type: string }
              pnr: { type: string, nullable: true }
              bookingRef: { type: string, nullable: true }
              sortOrder: { type: integer }
        supplier:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
            subBrand: { type: string }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    PayableBatch:
      type: object
      description: |
        [TRAVEL] Supplier-payable batch run (PRD_TRAVEL_BILLING G022).
        Groups N TravelSupplierPayable rows into a single bank-transfer
        run. Numbered TPB-YYYY-NNNN per-tenant per-year. State machine:
        draft → approved → sent_to_bank → settled (cancelled is the
        terminal sink). On settled, every child payable flips to paid in
        the same transaction.
      properties:
        id: { type: integer, readOnly: true }
        batchNumber: { type: string, example: "TPB-2026-0007" }
        status:
          {
            type: string,
            enum: [draft, approved, sent_to_bank, settled, cancelled],
          }
        paymentMethod:
          { type: string, enum: [bank_transfer, upi, cheque, rtgs, neft, wire] }
        currency: { type: string, example: "INR" }
        totalAmount: { type: string }
        approvedAt: { type: string, format: date-time, nullable: true }
        sentToBankAt: { type: string, format: date-time, nullable: true }
        settledAt: { type: string, format: date-time, nullable: true }
        cancelledAt: { type: string, format: date-time, nullable: true }
        cancelReason: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        payables:
          type: array
          items: { type: object }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelMicrosite:
      type: object
      description: "[TRAVEL] Multi-page public micro-site — brochures, religious-trip packets, school-trip packs."
      properties:
        id: { type: integer, readOnly: true }
        slug: { type: string }
        subBrand: { type: string, enum: [tmc, rfu, travelstall, visasure] }
        title: { type: string }
        pages:
          type: array
          items:
            type: object
            properties:
              slug: { type: string }
              title: { type: string }
              bodyHtml: { type: string }
        otpRequired: { type: boolean, default: false }
        publishedAt: { type: string, format: date-time, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelDiagnosticSubmission:
      type: object
      description: "[TRAVEL][TMC] Submission to the public 12-question school-trip readiness form."
      properties:
        id: { type: integer, readOnly: true }
        schoolName: { type: string }
        contactName: { type: string }
        contactPhone: { type: string }
        contactEmail: { type: string, format: email, nullable: true }
        answersJson:
          type: object
          description: 12-question raw answers keyed by question ID.
        scoreNumeric:
          { type: integer, minimum: 0, maximum: 100, readOnly: true }
        readinessTier:
          type: string
          enum: [low, medium, high]
          readOnly: true
        leadQualityTier:
          type: string
          enum: [cold, warm, hot]
          readOnly: true
        reportSlug:
          { type: string, readOnly: true, description: Public report URL slug. }
        reportPdfUrl: { type: string, readOnly: true, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"
    TravelRfuLeadProfile:
      type: object
      description: "[TRAVEL][RFU Umrah] Religious-fitness-and-Umrah pilgrim profile."
      properties:
        id: { type: integer, readOnly: true }
        contactId: { type: integer }
        ageBand: { type: string, enum: [under_30, 30_45, 46_60, over_60] }
        mobilityNeeds: { type: string, nullable: true }
        familyGroupSize: { type: integer }
        passportCountry: { type: string }
        budgetTierIndianRupees:
          { type: string, enum: [economy, comfort, premium, luxury] }
        preferredSeason: { type: string, nullable: true }
      allOf:
        - $ref: "#/components/schemas/AuditMeta"

    # ─── External Partner API ─────────────────────────────────────────
    ExternalLead:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string }
        source: { type: string, example: "callified" }
        sourcePayload:
          type: object
          description: Raw payload from the partner system.
        stage: { type: string }
        createdAt: { type: string, format: date-time, readOnly: true }
    ExternalCall:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        contactId: { type: integer, nullable: true }
        patientId: { type: integer, nullable: true }
        direction: { type: string, enum: [inbound, outbound] }
        durationSeconds: { type: integer, nullable: true }
        recordingUrl: { type: string, nullable: true }
        transcriptText:
          {
            type: string,
            nullable: true,
            description: Late-bound — patched via PATCH /calls/:id.,
          }
        provider: { type: string, example: "callified" }
        externalCallSid: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time, nullable: true }

paths:
  # ════════════════════════════════════════════════════════════════════
  # PLATFORM
  # ════════════════════════════════════════════════════════════════════
  /health:
    get:
      summary: Liveness + version probe
      description: |
        Public liveness check. Returns minimal `{ status, version }` without
        an Authorization header. With a valid Bearer token also returns
        `uptime` (process seconds) and `database` status — used by the
        deploy-gate health poll and the demo-monitor cron.
      tags: [Platform]
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  version: { type: string, example: "3.9.3" }
                  uptime:
                    {
                      type: number,
                      description: Process uptime in seconds (auth callers only).,
                    }
                  database:
                    {
                      type: string,
                      enum: [up, down],
                      description: Auth callers only.,
                    }
              examples:
                public:
                  summary: Unauthenticated response
                  value: { status: "ok", version: "3.9.3" }
                authenticated:
                  summary: Authenticated response
                  value:
                    {
                      status: "ok",
                      version: "3.9.3",
                      uptime: 18234,
                      database: "up",
                    }

  # ════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      summary: Authenticate and receive a JWT
      description: |
        Exchanges email + password for a JWT. Tokens carry `userId`,
        `tenantId`, `role` claims and are valid for 7 days. Pass the
        returned `token` as `Authorization: Bearer <token>` on every
        subsequent authenticated request.

        **Rate limit:** 1000 req / 15 min per IP.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Authentication successful.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/signup:
    post:
      summary: Register a new tenant + admin user
      description: |
        Creates a new `Tenant` and its founding `ADMIN` `User` in a single
        transaction. Optionally accepts `vertical` to provision the tenant
        directly into the wellness or travel surface; defaults to `generic`.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: Tenant + user created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400":
          $ref: "#/components/responses/ValidationError"
  /auth/register:
    post:
      summary: Self-serve user registration
      description: Used by signup pages where a new user joins an existing tenant via invite code.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, inviteToken]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                name: { type: string }
                inviteToken: { type: string }
      responses:
        "201": { description: User created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /auth/forgot-password:
    post:
      summary: Request password-reset email
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          {
            description: Reset email queued (silent — never leaks whether email exists).,
          }
  /auth/reset-password:
    post:
      summary: Reset password with one-time token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password, minLength: 8 }
      responses:
        "200": { description: Password updated. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /auth/2fa/enable:
    post:
      summary: Begin TOTP 2FA enrollment
      description: |
        Generates a TOTP secret and otpauth URI for the caller. Client
        renders the URI as a QR code (e.g. Google Authenticator). 2FA is
        not activated until `POST /auth/2fa/verify` succeeds.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TwoFactorEnableRequest" }
      responses:
        "200":
          description: Enrollment artefacts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TwoFactorEnableResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/2fa/verify:
    post:
      summary: Verify TOTP code and activate 2FA
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TwoFactorVerifyRequest" }
      responses:
        "200": { description: 2FA activated. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /auth/2fa/disable:
    post:
      summary: Disable TOTP 2FA for the caller
      tags: [Auth]
      responses:
        "200": { description: 2FA deactivated. }
  /auth/step-up:
    post:
      summary: Issue a short-lived elevated session
      description: |
        For sensitive write actions (delete-tenant, rotate keys, payout).
        Caller submits current password + optional TOTP; returns a 5-minute
        step-up token to attach via `X-Step-Up-Token`.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password }
                totp: { type: string, nullable: true }
      responses:
        "200":
          description: Step-up token issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  stepUpToken: { type: string }
                  expiresIn: { type: integer, example: 300 }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /sso/initiate:
    post:
      summary: Initiate SSO redirect flow
      description: Returns the IdP redirect URL for SAML / OIDC sign-in.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantSlug]
              properties:
                tenantSlug: { type: string }
      responses:
        "200": { description: Redirect URL returned. }
  /scim/v2/Users:
    get:
      summary: List provisioned users (SCIM 2.0)
      tags: [Auth]
      security:
        - ApiKeyAuth: []
      responses:
        "200": { description: SCIM ListResponse. }

  # ════════════════════════════════════════════════════════════════════
  # USERS & ROLES
  # ════════════════════════════════════════════════════════════════════
  /me:
    get:
      summary: Get the authenticated user's session
      description: |
        Returns the current `User` plus their `Tenant` and the resolved
        permissions matrix. Front-end calls this on every page load to
        populate `AuthContext`.
      tags: [Users & Roles]
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  tenant: { $ref: "#/components/schemas/Tenant" }
                  permissions:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /users:
    get:
      summary: List tenant users
      tags: [Users & Roles]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: role
          schema: { type: string, enum: [ADMIN, MANAGER, USER] }
      responses:
        "200":
          description: Array of users.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Invite a new user
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                role: { type: string, enum: [ADMIN, MANAGER, USER] }
                wellnessRole:
                  {
                    type: string,
                    enum: [doctor, professional, telecaller, helper],
                    nullable: true,
                  }
                subBrandAccess:
                  type: array
                  items:
                    { type: string, enum: [tmc, rfu, travelstall, visasure] }
      responses:
        "201":
          description: User invited (invite email queued).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      summary: Get a single user
      tags: [Users & Roles]
      responses:
        "200":
          description: User.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a user (role, wellnessRole, subBrandAccess, isActive)
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/User" }
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      summary: Soft-delete (deactivate) a user
      description: Requires ADMIN. Sets `isActive=false`; user is purged after 90 days by retention engine.
      tags: [Users & Roles]
      responses:
        "204": { description: Deactivated. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /roles:
    get:
      summary: List role definitions + permissions
      tags: [Users & Roles]
      responses:
        "200": { description: Role list. }

