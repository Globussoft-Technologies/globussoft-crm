openapi: 3.0.0
info:
  title: Globussoft Enterprise CRM API
  version: 3.2.0
  description: Public REST API for third-party developer integrations. Use Webhooks for streaming external state events and REST endpoints for CRUD fetching.
servers:
  - url: http://localhost:5000/api
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
paths:
  /deals:
    get:
      summary: Retrieve Pipeline Deals
      description: Returns an array of deal objects, optionally filtered.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: A JSON array of deals alongside relational sub-nodes.
  /contacts:
    get:
      summary: Retrieve Address Book Contacts
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Contact dataset
  /contacts/by-status:
    get:
      summary: Retrieve Contacts By Status
      description: Returns contacts filtered by status. Default status is Customer.
      security:
        - ApiKeyAuth: []

      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - Lead
              - Prospect
              - Customer
              - Churned
            default: Customer
          description: Contact status

      responses:
        "200":
          description: Contacts fetched successfully

        "500":
          description: Internal server error
