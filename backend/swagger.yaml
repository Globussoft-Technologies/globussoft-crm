  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — REVIEWS (new — #1156)
  # ════════════════════════════════════════════════════════════════════
  /travel/reviews/public/{token}:
    get:
      summary: "[PUBLIC] Read a post-trip review form by token"
      description: |
        Token-gated public form surface for the post-trip review email link
        (`/p/review/:token`). Returns the question set with `{destination}`
        woven in, plus the submission state (`requested | submitted`).
        Fixed question set lives in `lib/travelReviewQuestions.js`.
      tags: [Travel — Operations]
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Review form payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  destination: { type: string }
                  status: { type: string, enum: [requested, submitted] }
                  alreadySubmitted: { type: boolean }
                  overallRating: { type: integer, nullable: true }
                  form:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        type: { type: string }
              example:
                destination: "Manali"
                status: "requested"
                alreadySubmitted: false
                overallRating: null
                form:
                  - {
                      key: "overallRating",
                      label: "Rate Manali overall",
                      type: "rating",
                    }
        "404":
          description: Review link not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example: { error: "Review link not found", code: "NOT_FOUND" }
  /travel/reviews/public/{token}/submit:
    post:
      summary: "[PUBLIC] Submit a post-trip review by token"
      description: |
        Idempotency-protected — re-submission returns 409 ALREADY_SUBMITTED.
        Validates each answer against the question's type per
        `validateSubmission()`; persists answers as JSON on TravelTripReview.
      tags: [Travel — Operations]
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  description: Map of question-key → answer (number for ratings, string for free-text).
            example:
              answers:
                overallRating: 5
                bestMoment: "Snowfall on Day 3"
                wouldRecommend: true
      responses:
        "201":
          description: Stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  overallRating: { type: integer }
              example:
                ok: true
                overallRating: 5
        "400":
          description: Invalid answers.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                {
                  error: "Some answers need attention",
                  code: "INVALID_ANSWERS",
                }
        "404": { description: Token not found. }
        "409": { description: Already submitted. }
  /travel/reviews:
    get:
      summary: List submitted reviews (advisor, sub-brand-scoped)
      description: |
        Returns the most recent 200 submitted reviews for the caller's
        accessible sub-brands. Joins each review back to its itinerary
        (destination, sub-brand) and reviewer contact (name, email).
      tags: [Travel — Operations]
      responses:
        "200":
          description: Review feed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        itineraryId: { type: integer }
                        contactId: { type: integer, nullable: true }
                        overallRating: { type: integer }
                        destination: { type: string, nullable: true }
                        subBrand: { type: string, nullable: true }
                        contactName: { type: string, nullable: true }
                        contactEmail: { type: string, nullable: true }
                        contactPhone: { type: string, nullable: true }
                        answers: { type: object }
                        submittedAt: { type: string, format: date-time }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — PURCHASE ORDERS (G035/G036/G037)
  # ════════════════════════════════════════════════════════════════════
  /travel/purchase-orders:
    get:
      summary: List supplier purchase orders
      description: |
        Sub-brand-scoped (inherited from the parent supplier). Supports
        `?supplierId`, `?status`, `?bookingId` filters + paging.
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - in: query
          name: supplierId
          schema: { type: integer }
        - in: query
          name: bookingId
          schema: { type: integer }
        - in: query
          name: status
          schema:
            {
              type: string,
              enum: [draft, sent, acknowledged, fulfilled, cancelled],
            }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: PO list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseOrders:
                    {
                      type: array,
                      items:
                        { $ref: "#/components/schemas/TravelPurchaseOrder" },
                    }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
              example:
                purchaseOrders:
                  - id: 14
                    poNumber: "TPO-2026-0014"
                    status: "sent"
                    supplierId: 7
                    totalAmount: "150000.00"
                    currency: "INR"
                total: 1
                limit: 50
                offset: 0
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a draft purchase order (ADMIN/MANAGER)
      description: |
        Creates an empty draft PO under the parent supplier. PO number is
        auto-generated `TPO-YYYY-NNNN` in a race-safe transaction.
      tags: [Travel — Suppliers & Pricing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplierId]
              properties:
                supplierId: { type: integer }
                bookingId: { type: integer, nullable: true }
                currency: { type: string, default: "INR" }
                notes: { type: string, nullable: true }
            example:
              supplierId: 7
              bookingId: 91
              currency: "INR"
              notes: "PO for Manali hotel block"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TravelPurchaseOrder" }
              example:
                id: 14
                poNumber: "TPO-2026-0014"
                status: "draft"
                supplierId: 7
                bookingId: 91
                currency: "INR"
                createdBy: 12
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Supplier not found. }
        "409": { description: PO number collision — caller should retry. }
  /travel/purchase-orders/{id}:
    get:
      summary: Read one PO with lines + supplier
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: PO detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TravelPurchaseOrder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a draft PO (ADMIN/MANAGER)
      description: |
        Only allowed in `draft` state — returns 409 INVALID_STATUS_TRANSITION
        otherwise.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency: { type: string }
                notes: { type: string, nullable: true }
                bookingId: { type: integer, nullable: true }
      responses:
        "200": { description: Updated. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: PO not in draft state. }
  /travel/purchase-orders/{id}/lines:
    post:
      summary: Add a PO line item (ADMIN/MANAGER)
      description: |
        Line types: `service | tax | fee | discount`. Discount lines flip
        sign automatically. PO totals (`subtotal`, `taxAmount`,
        `totalAmount`) are recomputed inside the same transaction.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lineType, description]
              properties:
                lineType: { type: string, enum: [service, tax, fee, discount] }
                description: { type: string }
                quantity: { type: number, default: 1 }
                unitPrice: { type: number, default: 0 }
                pnr: { type: string, nullable: true }
                bookingRef: { type: string, nullable: true }
                sortOrder: { type: integer, default: 0 }
            example:
              lineType: "service"
              description: "Room block — 20 doubles × 3 nights"
              quantity: 60
              unitPrice: 2500
              bookingRef: "BLK-2026-091"
              sortOrder: 1
      responses:
        "201":
          description: Line created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  lineType: { type: string }
                  lineTotal: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: PO is in fulfilled / cancelled state. }
  /travel/purchase-orders/{id}/lines/{lineId}:
    put:
      summary: Update a PO line item (ADMIN/MANAGER)
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: lineId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lineType: { type: string }
                description: { type: string }
                quantity: { type: number }
                unitPrice: { type: number }
                pnr: { type: string, nullable: true }
                bookingRef: { type: string, nullable: true }
      responses:
        "200": { description: Line updated. }
        "404": { description: Line not found. }
        "409": { description: PO terminal state. }
    delete:
      summary: Delete a PO line item (ADMIN/MANAGER)
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: lineId
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: PO terminal state. }
  /travel/purchase-orders/{id}/send:
    post:
      summary: Transition PO draft → sent
      description: |
        State-machine transition. G042 — additionally runs the
        supplier-credit-limit check; returns 409 CREDIT_LIMIT_EXCEEDED
        on breach. ADMIN can override via `overrideCreditLimit=true`.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                overrideCreditLimit: { type: boolean }
      responses:
        "200": { description: Transitioned. }
        "409":
          description: Invalid status transition or credit limit exceeded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                error: "Purchase order would exceed supplier credit limit"
                code: "CREDIT_LIMIT_EXCEEDED"
                supplierId: 7
                current: "240000.00"
                limit: "300000.00"
                projected: "390000.00"
  /travel/purchase-orders/{id}/acknowledge:
    post:
      summary: Transition PO sent → acknowledged
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Transitioned. }
        "409": { description: Invalid status transition. }
  /travel/purchase-orders/{id}/fulfill:
    post:
      summary: Transition PO acknowledged → fulfilled + auto-create payables (G037)
      description: |
        On fulfilment, every `service`-typed line auto-creates a matching
        `TravelSupplierPayable` row linked via `purchaseOrderId`. The
        transition + payable inserts run in one transaction.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Fulfilled + payables created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseOrder:
                    { $ref: "#/components/schemas/TravelPurchaseOrder" }
                  payablesCreated: { type: integer }
              example:
                purchaseOrder: { id: 14, status: "fulfilled" }
                payablesCreated: 3
        "409": { description: Invalid status transition. }
  /travel/purchase-orders/{id}/cancel:
    post:
      summary: Cancel a PO (ADMIN)
      description: Requires `cancelReason`. Terminal state.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancelReason]
              properties:
                cancelReason: { type: string }
            example:
              cancelReason: "Trip cancelled by school"
      responses:
        "200": { description: Cancelled. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: PO already in terminal state. }
  /travel/purchase-orders/{id}/pdf:
    get:
      summary: Render the PO as a PDF (G036)
      description: Returns `application/pdf` via `pdfRenderer.renderSupplierPo`.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: PDF.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — SUPPLIER COMMISSIONS (G045)
  # ════════════════════════════════════════════════════════════════════
  /travel/suppliers/{id}/commission-entries:
    post:
      summary: Accrue a new supplier commission entry
      description: |
        Records a commission entry against the supplier. Section 194H TDS
        defaults to 5% (PRD DD-5.5). Effective commission rate falls back
        to the supplier's stored `commissionPercent` when not supplied.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseAmount]
              properties:
                baseAmount: { type: number }
                commissionPercent: { type: number, nullable: true }
                commissionAmount: { type: number, nullable: true }
                currency: { type: string, default: "INR" }
                tdsPercent:
                  {
                    type: number,
                    nullable: true,
                    description: "Defaults to 5% (sec 194H).",
                  }
                tdsAmount: { type: number, nullable: true }
                bookingId: { type: integer, nullable: true }
                purchaseOrderId: { type: integer, nullable: true }
                invoiceId: { type: integer, nullable: true }
                fiscalYear: { type: string, example: "FY2025-26" }
                entryType:
                  {
                    type: string,
                    enum: [accrued, settled, reversed, adjustment],
                  }
                notes: { type: string, nullable: true }
                accruedAt: { type: string, format: date-time, nullable: true }
            example:
              baseAmount: 100000
              commissionPercent: 12
              fiscalYear: "FY2025-26"
              bookingId: 91
              notes: "DPS Manali"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  commissionAmount: { type: string }
                  tdsAmount: { type: string }
                  netAmount: { type: string }
                  status: { type: string }
                  fiscalYear: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Supplier not found. }
    get:
      summary: List commission entries for a supplier
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: query
          name: fiscalYear
          schema: { type: string, example: "FY2025-26" }
        - in: query
          name: status
          schema: { type: string, enum: [accrued, settled, reversed] }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries: { type: array, items: { type: object } }
                  total: { type: integer }
  /travel/suppliers/{id}/commission-entries/{entryId}:
    get:
      summary: Read one commission entry
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Entry. }
        "404": { $ref: "#/components/responses/NotFound" }
  /travel/suppliers/{id}/commission-entries/{entryId}/settle:
    post:
      summary: Flip accrued → settled (ADMIN/MANAGER)
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Settled. }
        "409": { description: Already settled / reversed. }
  /travel/suppliers/{id}/commission-entries/{entryId}/reverse:
    post:
      summary: Reverse a commission entry (ADMIN)
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: entryId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reversalReason]
              properties:
                reversalReason: { type: string }
      responses:
        "200": { description: Reversed. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Already reversed. }
  /travel/suppliers/{id}/commission-statement:
    get:
      summary: Per-FY commission rollup for a supplier
      description: |
        Returns accrued / settled / reversed counts + totals + TDS deducted
        + net payable for the queried FY. Defaults to the current FY when
        `fiscalYear` is omitted.
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: query
          name: fiscalYear
          schema: { type: string, example: "FY2025-26" }
      responses:
        "200":
          description: Statement.
          content:
            application/json:
              schema:
                type: object
                properties:
                  supplierId: { type: integer }
                  supplierName: { type: string }
                  subBrand: { type: string }
                  fiscalYear: { type: string }
                  counts:
                    type: object
                    properties:
                      accrued: { type: integer }
                      settled: { type: integer }
                      reversed: { type: integer }
                      total: { type: integer }
                  totals:
                    type: object
                    properties:
                      accruedCommission: { type: number }
                      settledCommission: { type: number }
                      reversedCommission: { type: number }
                      tdsDeducted: { type: number }
                      netPayable: { type: number }
                      netSettled: { type: number }
              example:
                supplierId: 7
                supplierName: "Manali Heights Resort"
                subBrand: "tmc"
                fiscalYear: "FY2025-26"
                counts: { accrued: 4, settled: 2, reversed: 0, total: 6 }
                totals:
                  accruedCommission: 48000
                  settledCommission: 24000
                  reversedCommission: 0
                  tdsDeducted: 3600
                  netPayable: 22800
                  netSettled: 11400
  /travel/suppliers/{id}/commission-statement.csv:
    get:
      summary: Per-FY commission statement as CSV
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: query
          name: fiscalYear
          schema: { type: string }
      responses:
        "200":
          description: text/csv.
          content:
            text/csv:
              schema: { type: string }
  /travel/commissions/stats:
    get:
      summary: Tenant-wide commission rollup across all suppliers
      description: |
        Aggregates accrued / settled / reversed counts + totals across
        every supplier the caller can access in the requested FY.
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - in: query
          name: fiscalYear
          schema: { type: string }
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fiscalYear: { type: string }
                  distinctSuppliers: { type: integer }
                  counts: { type: object }
                  totals: { type: object }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — PAYABLE BATCHES (G022)
  # ════════════════════════════════════════════════════════════════════
  /travel/payable-batches:
    get:
      summary: List supplier-payable batches
      description: |
        Tenant-scoped. State machine:
        draft → approved → sent_to_bank → settled (cancelled is terminal).
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: status
          schema:
            {
              type: string,
              enum: [draft, approved, sent_to_bank, settled, cancelled],
            }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Batches.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payableBatches:
                    type: array
                    items: { $ref: "#/components/schemas/PayableBatch" }
                  total: { type: integer }
              example:
                payableBatches:
                  - id: 4
                    batchNumber: "TPB-2026-0004"
                    status: "approved"
                    paymentMethod: "neft"
                    totalAmount: "320000.00"
                total: 1
    post:
      summary: Create a draft batch from a set of payable IDs (ADMIN/MANAGER)
      tags: [Travel — Quotes & Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payableIds, paymentMethod]
              properties:
                payableIds:
                  type: array
                  items: { type: integer }
                paymentMethod:
                  {
                    type: string,
                    enum: [bank_transfer, upi, cheque, rtgs, neft, wire],
                  }
                currency: { type: string, default: "INR" }
                notes: { type: string, nullable: true }
            example:
              payableIds: [7, 12, 19]
              paymentMethod: "neft"
              notes: "Mid-month run"
      responses:
        "201":
          description: Batch created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayableBatch" }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/payable-batches/{id}:
    get:
      summary: Read a payable batch with linked payables
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Batch detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayableBatch" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a draft batch (ADMIN/MANAGER)
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentMethod: { type: string }
                notes: { type: string, nullable: true }
      responses:
        "200": { description: Updated. }
        "409": { description: Batch not in draft state. }
  /travel/payable-batches/{id}/add-payable:
    post:
      summary: Attach a payable to a draft batch
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payableId]
              properties:
                payableId: { type: integer }
      responses:
        "200": { description: Attached. }
        "409": { description: Batch not in draft state. }
  /travel/payable-batches/{id}/remove-payable:
    post:
      summary: Detach a payable from a draft batch
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payableId]
              properties:
                payableId: { type: integer }
      responses:
        "200": { description: Detached. }
  /travel/payable-batches/{id}/approve:
    post:
      summary: Approve a draft batch (ADMIN)
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Approved. }
        "409": { description: Invalid status transition. }
  /travel/payable-batches/{id}/send-to-bank:
    post:
      summary: Mark the batch as sent to bank (ADMIN)
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Transitioned. }
        "409": { description: Invalid status transition. }
  /travel/payable-batches/{id}/settle:
    post:
      summary: Settle a sent batch — auto-flips every child payable to paid
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Settled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch: { $ref: "#/components/schemas/PayableBatch" }
                  payablesPaid: { type: integer }
        "409": { description: Invalid status transition. }
  /travel/payable-batches/{id}/cancel:
    post:
      summary: Cancel the batch — releases children back to free payables (ADMIN)
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancelReason]
              properties:
                cancelReason: { type: string }
      responses:
        "200": { description: Cancelled. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/payable-batches/{id}/payment-csv:
    get:
      summary: Export the batch as a bank-friendly CSV (RFC 4180)
      description: |
        Columns:
        `batchNumber,paymentMethod,supplierName,supplierGstin,bankAccountMasked,
        amount,currency,description,poNumber,reference`
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv:
              schema: { type: string }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — SETTLEMENT TIMELINE (G024) + INVOICE LEDGERS (G030-G034) + FX
  # ════════════════════════════════════════════════════════════════════
  /travel/settlements/timeline:
    get:
      summary: Unified inflow + outflow settlement timeline (Gantt)
      description: |
        Read-only aggregator powering `SettlementGantt.jsx`. Joins
        `TravelPaymentSchedule` (customer milestones) + `TravelSupplierPayable`
        (supplier outflows) on one date axis. Default window: T-30d to T+90d.
        Sub-brand isolation: payables join through supplier.subBrand;
        schedules join through invoice.subBrand.
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: subBrand
          schema: { type: string, enum: [tmc, rfu, travelstall, visasure] }
      responses:
        "200":
          description: Timeline payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          {
                            type: string,
                            enum: [invoice_payment_schedule, supplier_payable],
                          }
                        id: { type: integer }
                        invoiceId: { type: integer, nullable: true }
                        supplierId: { type: integer, nullable: true }
                        dueDate: { type: string, format: date-time }
                        amount: { type: number }
                        currency: { type: string }
                        status: { type: string }
                        label: { type: string }
                  summary:
                    type: object
                    properties:
                      totalInflowExpected: { type: number }
                      totalOutflowExpected: { type: number }
                      netExpected: { type: number }
                  range:
                    type: object
                    properties:
                      from: { type: string, format: date-time }
                      to: { type: string, format: date-time }
              example:
                items:
                  - type: "invoice_payment_schedule"
                    id: 14
                    invoiceId: 91
                    supplierId: null
                    dueDate: "2026-07-01T00:00:00Z"
                    amount: 25000
                    currency: "INR"
                    status: "pending"
                    label: "TINV-2026-0091 M1"
                summary:
                  totalInflowExpected: 250000
                  totalOutflowExpected: 180000
                  netExpected: 70000
                range:
                  from: "2026-05-18T00:00:00Z"
                  to: "2026-09-15T00:00:00Z"
        "400":
          description: Inverted or unparseable date range.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                { error: "from must be <= to", code: "INVERTED_DATE_RANGE" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /travel/invoices/customer-ledger:
    get:
      summary: GST customer ledger (G030 / FR-3.4.4)
      description: |
        Read-only ledger sourced from existing `TravelInvoice` rows.
        Filters: `?gstin=` (15-char GSTIN shape) OR `?contactId=`; one is
        required. `?fy=FY2025-26` defaults to current FY. `?format=csv`
        returns CSV instead of JSON.
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: fy
          schema: { type: string, example: "FY2025-26" }
        - in: query
          name: gstin
          schema: { type: string }
        - in: query
          name: contactId
          schema: { type: integer }
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        "200":
          description: JSON ledger (or CSV when `?format=csv`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  fy: { type: string }
                  rows: { type: array, items: { type: object } }
                  totals: { type: object }
              example:
                fy: "FY2025-26"
                rows:
                  - invoiceNum: "TMC/25-26/0091"
                    invoiceDate: "2026-05-12"
                    taxableValue: "100000.00"
                    igst: "18000.00"
                    total: "118000.00"
                totals:
                  taxableValue: "100000.00"
                  igst: "18000.00"
                  total: "118000.00"
            text/csv:
              schema: { type: string }
        "400":
          description: Missing identifier or invalid shape.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                {
                  error: "one of gstin or contactId is required",
                  code: "MISSING_IDENTIFIER",
                }
  /travel/invoices/tds-register:
    get:
      summary: TDS register / Form 26Q export (G031 / FR-3.4.6)
      description: |
        Section 194H + 194C TDS register sourced from
        `TravelSupplierCommissionEntry.tdsAmount`. `?section=194H|194C`
        filters by section. `?format=csv` returns Form-26Q-shaped CSV
        suitable for TRACES upload.
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: fy
          schema: { type: string }
        - in: query
          name: section
          schema: { type: string, enum: ["194H", "194C"] }
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        "200":
          description: TDS rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fy: { type: string }
                  rows: { type: array, items: { type: object } }
                  totals: { type: object }
            text/csv:
              schema: { type: string }
  /travel/invoices/commission-ledger:
    get:
      summary: Commission ledger (G032 / FR-3.4.7)
      description: |
        Earned + paid commissions sourced from `TravelSupplierCommissionEntry`.
        `?type=supplier|customer` narrows by counter-party type.
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: fy
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [supplier, customer] }
        - in: query
          name: format
          schema: { type: string, enum: [json, csv] }
      responses:
        "200":
          description: Commission rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fy: { type: string }
                  rows: { type: array, items: { type: object } }
                  totals: { type: object }
            text/csv:
              schema: { type: string }
  /fx/latest:
    get:
      summary: Latest cached FX rate for a currency pair
      description: |
        Tenant-agnostic cross-currency reference. `?base=` and `?quote=`
        are required 3-character ISO 4217 codes. Backed by the
        `fxRateEngine.js` cron which refreshes hourly. Read-only — the
        cron is the sole writer.
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: base
          required: true
          schema: { type: string, example: "INR" }
        - in: query
          name: quote
          required: true
          schema: { type: string, example: "USD" }
      responses:
        "200":
          description: Latest rate.
          content:
            application/json:
              schema:
                type: object
                properties:
                  base: { type: string }
                  quote: { type: string }
                  rate: { type: number }
                  fetchedAt: { type: string, format: date-time }
                  source: { type: string }
              example:
                base: "INR"
                quote: "USD"
                rate: 0.012
                fetchedAt: "2026-06-17T05:00:00Z"
                source: "exchangerate.host"
        "400":
          description: Missing or malformed currency code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                {
                  error: "base and quote must be 3-character ISO 4217 codes",
                  code: "INVALID_CURRENCY_CODE",
                }
        "404":
          description: No cached rate.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                {
                  error: "No rate available for this pair yet",
                  code: "NO_RATE",
                }
  /fx/history:
    get:
      summary: Historical FX rate series for a currency pair
      tags: [Travel — Quotes & Billing]
      parameters:
        - in: query
          name: base
          required: true
          schema: { type: string }
        - in: query
          name: quote
          required: true
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Historical series.
          content:
            application/json:
              schema:
                type: object
                properties:
                  base: { type: string }
                  quote: { type: string }
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        rate: { type: number }
                        fetchedAt: { type: string, format: date-time }
                        source: { type: string }
        "400":
          description: Bad currency or date.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — SUPPLIER RECONCILIATION (G044/G046)
  # ════════════════════════════════════════════════════════════════════
  /travel/suppliers/{id}/reconciliation-batches:
    post:
      summary: Create a draft reconciliation batch (ADMIN/MANAGER)
      description: |
        Operator-driven supplier-statement reconciliation. Each batch
        holds the lines parsed from a supplier statement; subsequent calls
        bulk-add lines, run the auto-matcher, mark review / reconciliation
        / dispute.
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [statementMonth]
              properties:
                statementMonth: { type: string, example: "2026-05" }
                notes: { type: string }
      responses:
        "201":
          description: Batch created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  statementMonth: { type: string }
                  status:
                    {
                      type: string,
                      enum: [draft, reviewed, reconciled, disputed],
                    }
        "400": { $ref: "#/components/responses/ValidationError" }
    get:
      summary: List reconciliation batches for a supplier
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Batches.
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches: { type: array, items: { type: object } }
                  total: { type: integer }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}:
    get:
      summary: Read one reconciliation batch with lines
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Batch detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  status: { type: string }
                  lines: { type: array, items: { type: object } }
        "404": { $ref: "#/components/responses/NotFound" }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/lines/bulk:
    post:
      summary: Bulk-add lines parsed from a supplier statement
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lines]
              properties:
                lines:
                  type: array
                  items:
                    type: object
                    properties:
                      pnr: { type: string, nullable: true }
                      bookingRef: { type: string, nullable: true }
                      description: { type: string }
                      amount: { type: number }
                      currency: { type: string }
                      statementDate: { type: string, format: date }
            example:
              lines:
                - pnr: "AI-5678"
                  description: "Room block — 20 doubles × 3 nights"
                  amount: 150000
                  currency: "INR"
                  statementDate: "2026-05-15"
      responses:
        "201":
          description: Lines added.
          content:
            application/json:
              schema:
                type: object
                properties:
                  added: { type: integer }
                  totalLines: { type: integer }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/auto-match:
    post:
      summary: Run the auto-matcher on the batch's lines
      description: |
        Pairs each unmatched statement line with the closest TravelSupplierPayable
        by PNR / bookingRef / description-amount-tolerance. Returns a per-line
        match-decision payload.
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Match decisions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  matched: { type: integer }
                  unmatched: { type: integer }
                  decisions: { type: array, items: { type: object } }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/lines/{lineId}/manual-match:
    post:
      summary: Operator-picked manual match for a line
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
        - in: path
          name: lineId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payableId]
              properties:
                payableId: { type: integer }
                comment: { type: string }
      responses:
        "200": { description: Matched. }
        "404": { $ref: "#/components/responses/NotFound" }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/review:
    post:
      summary: Transition batch draft → reviewed
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Reviewed. }
        "409": { description: Invalid transition. }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/reconcile:
    post:
      summary: Transition batch reviewed → reconciled
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Reconciled. }
        "409": { description: Invalid transition. }
  /travel/suppliers/{id}/reconciliation-batches/{batchId}/dispute:
    post:
      summary: Flag the batch as disputed
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: batchId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { description: Disputed. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/suppliers/{id}/invoice-uploads:
    post:
      summary: Upload a supplier invoice PDF / CSV / image
      description: |
        Multipart upload — PDF, CSV, JPG, PNG only, 10 MB cap. File is
        stored under `uploads/supplier-invoices/`; the filename is
        UUID-derived from the validated MIME type (NOT the client filename).
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                statementMonth: { type: string }
      responses:
        "201":
          description: Uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  filename: { type: string }
                  mimeType: { type: string }
                  bytes: { type: integer }
        "413": { description: File exceeds 10 MB. }
        "415": { description: Unsupported MIME type. }
    get:
      summary: List supplier invoice uploads
      tags: [Travel — Suppliers & Pricing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200":
          description: Uploads.
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploads: { type: array, items: { type: object } }
                  total: { type: integer }
  /travel/suppliers/{id}/invoice-uploads/{uploadId}/match:
    post:
      summary: Link an uploaded invoice to a payable
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: uploadId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payableId]
              properties:
                payableId: { type: integer }
      responses:
        "200": { description: Matched. }
  /travel/suppliers/{id}/invoice-uploads/{uploadId}:
    delete:
      summary: Delete a supplier invoice upload (ADMIN)
      tags: [Travel — Suppliers & Pricing]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: uploadId
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — WHATSAPP (Q9, Wati transport)
  # ════════════════════════════════════════════════════════════════════
  /travel/whatsapp/status:
    get:
      summary: Read the travel WhatsApp connection status
      description: |
        Returns whether the Wati credential is configured + last-sync
        metadata. Distinct from `/api/whatsapp/*` (Meta Cloud, wellness/
        generic) — this is the travel-tenant Wati transport (Q9).
      tags: [Travel — Operations]
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  provider: { type: string, example: "wati" }
                  lastSyncAt:
                    { type: string, format: date-time, nullable: true }
                  webhookHealthy: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /travel/whatsapp/media:
    get:
      summary: "[PUBLIC] Proxy media download from Wati"
      description: Authenticated media download proxy — proxies a Wati media URL with the configured tenant credentials.
      tags: [Travel — Operations]
      security: []
      parameters:
        - in: query
          name: messageId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Media bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }
  /travel/whatsapp/templates:
    get:
      summary: List Wati-side approved templates
      tags: [Travel — Operations]
      responses:
        "200":
          description: Templates.
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        language: { type: string }
                        category: { type: string }
                        status: { type: string }
  /travel/whatsapp/send:
    post:
      summary: Send a WhatsApp template message via Wati
      tags: [Travel — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, templateName]
              properties:
                to: { type: string, description: E.164 phone. }
                templateName: { type: string }
                language: { type: string, default: "en" }
                variables:
                  type: array
                  items: { type: string }
                contactId: { type: integer, nullable: true }
            example:
              to: "+919876543210"
              templateName: "trip_payment_reminder"
              language: "en"
              variables: ["Asha", "TINV-2026-0091", "₹25,000"]
              contactId: 421
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId: { type: string }
                  delivered: { type: boolean }
        "400": { $ref: "#/components/responses/ValidationError" }
        "503": { description: Wati provider unreachable. }
  /travel/whatsapp/send-media:
    post:
      summary: Send a WhatsApp media message (image, doc, etc.)
      tags: [Travel — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, mediaUrl, mediaType]
              properties:
                to: { type: string }
                mediaUrl: { type: string, format: uri }
                mediaType: { type: string, enum: [image, document, video] }
                caption: { type: string }
      responses:
        "200": { description: Sent. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/whatsapp/sync:
    post:
      summary: Trigger a Wati conversation sync (operator manual)
      description: Pulls fresh conversations from Wati; idempotent.
      tags: [Travel — Operations]
      responses:
        "200":
          description: Sync stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationsFetched: { type: integer }
                  messagesIngested: { type: integer }
  /travel/whatsapp/webhook:
    get:
      summary: "[PUBLIC] Wati webhook verification handshake"
      tags: [Travel — Operations]
      security: []
      responses:
        "200": { description: Verified. }
    post:
      summary: "[PUBLIC] Wati inbound webhook"
      description: Inbound message + status updates from Wati. Signature-verified inside the handler.
      tags: [Travel — Operations]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Wati-side payload shape (eventType, message, contact, etc.).
      responses:
        "200": { description: Acknowledged. }

  # ════════════════════════════════════════════════════════════════════
  # TRAVEL — ENGINE WEIGHTS + QUOTE/ITINERARY TEMPLATES + STALL/CURRICULUM/POIS
  # ════════════════════════════════════════════════════════════════════
  /travel/engine-weights:
    get:
      summary: Read TMC diagnostic engine weights
      description: |
        Returns the per-tenant override map of the deterministic TMC
        diagnostic engine's question weights. Empty object falls back to
        the default weights baked into `tmcDiagnosticEngine.js`.
      tags: [Travel — Diagnostics & Sales]
      responses:
        "200":
          description: Weights map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  weights:
                    {
                      type: object,
                      description: Object keyed by questionKey → number.,
                    }
              example:
                weights:
                  curriculumFit: 1.5
                  budgetFit: 1.2
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      summary: Update TMC diagnostic engine weights (ADMIN)
      tags: [Travel — Diagnostics & Sales]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [weights]
              properties:
                weights:
                  type: object
      responses:
        "200": { description: Updated. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /travel/quote-templates:
    get:
      summary: List travel quote templates
      description: Reusable per-sub-brand quote templates seeded into TravelQuote line items.
      tags: [Travel — Quotes & Billing]
      responses:
        "200":
          description: Templates.
          content:
            application/json:
              schema:
                type: object
                properties:
                  quoteTemplates: { type: array, items: { type: object } }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a quote template
      tags: [Travel — Quotes & Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, subBrand, lines]
              properties:
                name: { type: string }
                subBrand:
                  { type: string, enum: [tmc, rfu, travelstall, visasure] }
                lines:
                  type: array
                  items: { type: object }
            example:
              name: "Standard 5-day Manali"
              subBrand: "tmc"
              lines:
                - {
                    description: "Hotel — 4-star × 4 nights",
                    priceCents: 1500000,
                  }
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/quote-templates/{id}:
    get:
      summary: Read one quote template
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Template. }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update a quote template
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                lines: { type: array, items: { type: object } }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a quote template
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /travel/quote-templates/{id}/apply:
    post:
      summary: Apply a quote template into a TravelQuote
      description: Materialises the template's lines onto the target quote.
      tags: [Travel — Quotes & Billing]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quoteId]
              properties:
                quoteId: { type: integer }
      responses:
        "200":
          description: Applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  linesAdded: { type: integer }
        "400": { $ref: "#/components/responses/ValidationError" }
  /travel/itinerary-templates/stats:
    get:
      summary: Itinerary-template KPIs
      tags: [Travel — Trips & Itineraries]
      responses:
        "200": { description: Stats. }
  /travel/itinerary-templates/analytics.csv:
    get:
      summary: Itinerary-template analytics CSV
      tags: [Travel — Trips & Itineraries]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv: { schema: { type: string } }
  /travel/itinerary-templates/by-year:
    get:
      summary: Per-year template-usage rollup
      tags: [Travel — Trips & Itineraries]
      responses:
        "200": { description: Buckets. }
  /travel/itinerary-templates/by-month:
    get:
      summary: Per-month template-usage rollup
      tags: [Travel — Trips & Itineraries]
      responses:
        "200": { description: Buckets. }
  /travel/itinerary-templates/by-quarter:
    get:
      summary: Per-quarter template-usage rollup
      tags: [Travel — Trips & Itineraries]
      responses:
        "200": { description: Buckets. }
  /travel/itinerary-templates/{id}:
    patch:
      summary: Update an itinerary template
      tags: [Travel — Trips & Itineraries]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                days: { type: array, items: { type: object } }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete an itinerary template
      tags: [Travel — Trips & Itineraries]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /travel/itinerary-templates/{id}/archive:
    post:
      summary: Archive an itinerary template
      tags: [Travel — Trips & Itineraries]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Archived. }
  /travel/itinerary-templates/{id}/restore:
    post:
      summary: Restore an archived itinerary template
      tags: [Travel — Trips & Itineraries]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Restored. }
  /travel-personalised-destinations/recommend:
    post:
      summary: Recommend personalised destinations (Travel Stall LLM)
      description: |
        Travel Stall personalised destination recommender (TS18 Phase 2
        SHELL). STUB MODE per Q11 — returns canned recommendations until
        the Travel Stall LLM keys land.
      tags: [Travel — Microsites & Marketing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId]
              properties:
                contactId: { type: integer }
                travellerProfile:
                  type: object
                  properties:
                    interests: { type: array, items: { type: string } }
                    pax: { type: integer }
                    budgetCentsPerPax: { type: integer }
                    durationDays: { type: integer }
            example:
              contactId: 421
              travellerProfile:
                interests: ["beach", "luxury"]
                pax: 4
                budgetCentsPerPax: 25000000
                durationDays: 7
      responses:
        "200":
          description: Recommendations (stubbed today).
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      type: object
                      properties:
                        destination: { type: string }
                        fitScore: { type: number }
                        rationale: { type: string }
                  stubbed: { type: boolean }
        "503": { description: STUB_MODE — cred-blocked on Q11. }
