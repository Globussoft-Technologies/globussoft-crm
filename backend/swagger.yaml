        "200": { description: Threads. }
  /live-chat/sessions:
    get:
      summary: List live-chat sessions
      tags: [Communications]
      responses:
        "200": { description: Sessions. }
  /push/send:
    post:
      summary: Send a web-push notification
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
