  /marketplace-leads/webhook:
    post:
      summary: Marketplace inbound webhook (IndiaMART / JustDial / TradeIndia)
      description: |
        Inbound lead webhook from a marketplace provider. HMAC-signed.
        Routed through `lib/leadJunkFilter.js` + `lib/leadAutoRouter.js`
        before insert. **Unauthenticated** — provider IP allowlist + HMAC
        is the gate.
      tags: [Integrations, Public]
      security:
