  # ── Sub-brand integrations ───────────────────────────────────────
  /ratehawk/search:
    post:
      summary: "[TRAVEL] Search RateHawk hotel inventory"
      description: |
        Proxies to RateHawk's search API. Enforces per-tenant monthly
        budget cap via `lib/ratehawkClient.js`.
      tags: [Travel — Sub-Brand Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination, checkIn, checkOut, guests]
              properties:
                destination: { type: string }
                checkIn: { type: string, format: date }
                checkOut: { type: string, format: date }
                guests: { type: integer }
      responses:
        "200": { description: Hotel results. }
        "402": { description: Budget cap exceeded for the tenant this month. }
  /adsgpt/campaigns:
    get:
      summary: "[TRAVEL] List AdsGPT campaign drafts"
      tags: [Travel — Sub-Brand Integrations]
      responses:
        "200": { description: Campaigns. }
    post:
      summary: "[TRAVEL] Create an AdsGPT campaign"
      tags: [Travel — Sub-Brand Integrations]
      responses:
        "201": { description: Created (budget-cap enforced). }
        "402": { description: Budget cap exceeded. }
  /callified/initiate-call:
    post:
      summary: "[TRAVEL] Initiate a Callified.ai voice/WhatsApp outreach"
      description: |
        Delegates to `lib/callifiedClient.js`, which enforces enablement,
        budget cap, sub-brand persona resolution before the upstream call.
      tags: [Travel — Sub-Brand Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId]
              properties:
                contactId: { type: integer }
                subBrand: { type: string, enum: [tmc, rfu, travelstall, visasure] }
                channel: { type: string, enum: [voice, whatsapp] }
      responses:
        "200": { description: Call initiated. }
        "402": { description: Budget cap exceeded. }
        "403": { description: Disabled for this tenant. }
  /booking-expedia/search:
    post:
      summary: "[TRAVEL] Search Booking.com / Expedia inventory"
      tags: [Travel — Sub-Brand Integrations]
      responses:
        "200": { description: Inventory. }
  /travel-tmc-catalogue:
    get:
      summary: "[TRAVEL][TMC] List human-verified TMC trip catalogue entries"
      tags: [Travel — Sub-Brand Integrations]
      responses:
        "200": { description: Catalogue. }
  /travel/travelstall:
    get:
      summary: "[TRAVEL][Travel Stall] Family-holiday packs"
      tags: [Travel — Sub-Brand Integrations]
      responses:
        "200": { description: Packs. }

  # ════════════════════════════════════════════════════════════════════
  # EXTERNAL PARTNER API (X-API-Key)
  # ════════════════════════════════════════════════════════════════════
  /v1/external/health:
    get:
      summary: "[EXTERNAL] API-key liveness probe"
      description: |
        Verifies the API key is valid and returns the partner identity.
        Used by Callified.ai / Globus Phone / AdsGPT integrations as a
        liveness + auth probe.
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  partner: { type: string, example: "callified" }
                  tenantId: { type: integer }
        "401":
          description: Missing or invalid API key.
  /v1/external/me:
    get:
      summary: "[EXTERNAL] Get the partner identity tied to the API key"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      responses:
        "200": { description: Partner identity envelope. }
  /v1/external/contacts:
    get:
      summary: "[EXTERNAL] List contacts visible to this API key"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Contacts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Contact' }
  /v1/external/contacts/lookup:
    get:
      summary: "[EXTERNAL] Lookup contact by phone or email"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: phone
          schema: { type: string }
        - in: query
          name: email
          schema: { type: string, format: email }
      responses:
        "200":
          description: Match (or empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Contact' }
  /v1/external/patients/lookup:
    get:
      summary: "[EXTERNAL][WELLNESS] Lookup patient by phone (wellness tenants only)"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: phone
          schema: { type: string }
      responses:
        "200":
          description: Match.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patient' }
  /v1/external/leads:
    get:
      summary: "[EXTERNAL] Poll for newly-assigned leads (long-polling friendly)"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Leads.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ExternalLead' }
    post:
      summary: "[EXTERNAL] Push a new lead into the CRM"
      description: |
        Used by Callified.ai (voice intake → lead) and AdsGPT (ad-form
        submission → lead). Runs through `lib/leadJunkFilter.js` and
        `lib/leadAutoRouter.js` before insert.
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExternalLead' }
      responses:
        "201":
          description: Lead created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExternalLead' }
  /v1/external/leads/{id}/stage:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      summary: "[EXTERNAL] Move a lead to a new pipeline stage"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage: { type: string }
      responses:
        "200": { description: Stage updated. }
  /v1/external/calls:
    post:
      summary: "[EXTERNAL] Record a call session (placement + recording metadata)"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExternalCall' }
      responses:
        "201":
          description: Call recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExternalCall' }
  /v1/external/calls/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      summary: "[EXTERNAL] Late-bind a transcript / sentiment to an existing call"
      tags: [External Partner API]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
