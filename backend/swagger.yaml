      responses:
        "200":
          description: Tickets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets: { type: array, items: { type: object } }
                  total: { type: integer }
    post:
      summary: Create a support ticket
      tags: [Service & Support]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, body]
              properties:
                subject: { type: string }
                body: { type: string }
                contactId: { type: integer, nullable: true }
                priority: { type: string, enum: [low, normal, high, urgent] }
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /support/stats:
    get:
      summary: Support-ticket KPIs
      tags: [Service & Support]
      responses:
        "200":
          description: KPI rollup.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  open: { type: integer }
                  overdue: { type: integer }
  /support/{id}:
    get:
      summary: Read one ticket
      tags: [Service & Support]
