  /travel-curriculum:
    get:
      summary: List TMC curriculum mappings
      description: |
        TravelCurriculumMapping rows (curriculum + grade + subject →
        candidate destinations sorted by fitScore). Authoring is tenant-
        wide ADMIN, not sub-brand-scoped. CBSE + ICSE seeded; IB +
        Cambridge enabled but unseeded.
      tags: [Travel — Operations]
      parameters:
        - in: query
          name: curriculum
          schema: { type: string, enum: [CBSE, ICSE, IB, Cambridge] }
        - in: query
          name: grade
          schema: { type: string }
        - in: query
          name: subject
          schema: { type: string }
        - in: query
          name: isActive
          schema: { type: boolean }
      responses:
        "200":
          description: Mappings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mappings:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        curriculum: { type: string }
                        grade: { type: string }
                        subject: { type: string }
                        learningOutcome: { type: string }
                        destinationId: { type: integer, nullable: true }
                        fitScore: { type: integer }
                        isActive: { type: boolean }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a curriculum mapping (ADMIN)
      tags: [Travel — Operations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [curriculum, grade, subject]
              properties:
                curriculum: { type: string }
                grade: { type: string }
                subject: { type: string }
                learningOutcome: { type: string, nullable: true }
                destinationId: { type: integer, nullable: true }
                fitScore:
                  { type: integer, minimum: 1, maximum: 100, default: 50 }
            example:
              curriculum: "CBSE"
              grade: "10"
              subject: "Geography"
              learningOutcome: "Glacial landforms"
              destinationId: 7
              fitScore: 85
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409":
          description: Duplicate (curriculum, grade, subject, learningOutcome).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                {
                  error: "Curriculum mapping already exists",
                  code: "CURRICULUM_DUPLICATE",
                }
