  # ════════════════════════════════════════════════════════════════════
  # USERS & ROLES — additions (permissions catalog)
  # ════════════════════════════════════════════════════════════════════
  /permissions:
    get:
      summary: List the permission catalog
      description: |
        Returns the full permission catalog known to the backend — every
        `(module, action)` tuple the `requirePermission` middleware can
        check against. The frontend uses this to render the per-role
        permission matrix on the Roles & Permissions admin page.

        Aliased from `GET /api/roles/catalog` per SPEC §C3 (the canonical
        endpoint surface names `/api/permissions`; the implementation lives
        in `backend/routes/me.js` and is re-exported here for URL stability).
      tags: [Users & Roles]
      responses:
        "200":
          description: Permission catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalog:
                    type: object
                    description: Object keyed by module name → array of supported actions.
                  modules:
                    type: array
                    items:
                      type: object
                      properties:
                        module: { type: string }
                        actions:
                          type: array
                          items: { type: string }
                  domains:
                    type: object
                    description: Catalog re-grouped by high-level functional domain for the UI.
              example:
                catalog:
                  contacts: ["read", "write", "update", "delete"]
                  deals: ["read", "write", "update", "delete"]
                  suppliers: ["read", "write", "update", "delete"]
                modules:
                  - module: "contacts"
                    actions: ["read", "write", "update", "delete"]
                domains:
                  Sales: ["contacts", "deals", "pipelines"]
                  Travel: ["suppliers", "diagnostics"]
        "401": { $ref: "#/components/responses/Unauthorized" }
  /user/theme:
    get:
      summary: Get the caller's saved theme preference
      description: |
        Per-user theme preference, persisted for cross-device roaming
        (#870). Returns `system | light | dark`. Defaults to `system`
        if the user has never picked one.
      tags: [Users & Roles]
      responses:
        "200":
          description: Theme preference.
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme: { type: string, enum: [system, light, dark] }
              example:
                theme: "dark"
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      summary: Update the caller's theme preference
      description: |
        Idempotent upsert; the body's `theme` value MUST be one of
        `system | light | dark`. Any other value returns 400 INVALID_THEME.
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [theme]
              properties:
                theme: { type: string, enum: [system, light, dark] }
            example:
              theme: "dark"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme: { type: string }
                  updated: { type: boolean }
              example:
                theme: "dark"
                updated: true
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /staff:
    get:
      summary: List staff (users with optional commission + revenue-goal joins)
      description: |
        Lists staff users in the caller's tenant. Supports `?q=` free-text
        search, `?role=` filter (ADMIN/MANAGER/USER), `?wellnessRole=` (for
        wellness tenants), and `?includeInactive=true`. Sortable by name,
        email, createdAt. Returns the user record plus joined `commissionProfile`
        and `revenueGoal` rows when present.
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Search" }
        - in: query
          name: role
          schema: { type: string, enum: [ADMIN, MANAGER, USER] }
        - in: query
          name: wellnessRole
          schema:
            { type: string, enum: [doctor, professional, telecaller, helper] }
      responses:
        "200":
          description: Staff list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  staff:
                    type: array
                    items: { $ref: "#/components/schemas/User" }
                  total: { type: integer }
              example:
                staff:
                  - id: 12
                    email: "drharsh@enhancedwellness.in"
                    name: "Dr Harsh"
                    role: "USER"
                    wellnessRole: "doctor"
                    isActive: true
                total: 17
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a staff user (ADMIN)
      description: |
        Creates a new staff user in the caller's tenant. ADMIN-only. Triggers
        an email invite if `sendInvite=true`. Wellness-tenant calls may set
        `wellnessRole` to bind a clinical scope.
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, role]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                role: { type: string, enum: [ADMIN, MANAGER, USER] }
                wellnessRole:
                  {
                    type: string,
                    enum: [doctor, professional, telecaller, helper],
                    nullable: true,
                  }
                sendInvite: { type: boolean, default: true }
                password:
                  {
                    type: string,
                    format: password,
                    description: Optional — invite flow sets it later.,
                  }
                subBrandAccess:
                  type: array
                  items: { type: string }
                  description: Travel-only — which sub-brands the user may act on.
            example:
              email: "newdoc@enhancedwellness.in"
              name: "Dr New"
              role: "USER"
              wellnessRole: "doctor"
              sendInvite: true
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /staff/{id}:
    put:
      summary: Update a staff user (ADMIN)
      description: ADMIN-only. Updates name, role, wellnessRole, isActive, subBrandAccess.
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                role: { type: string, enum: [ADMIN, MANAGER, USER] }
                wellnessRole: { type: string, nullable: true }
                isActive: { type: boolean }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Soft-delete a staff user (ADMIN)
      description: Sets `isActive=false`. Hard-delete is not supported; staff history is retained.
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /staff/{id}/role:
    put:
      summary: Change a staff user's role (ADMIN)
      description: |
        Mutates `User.role`. Wellness-vertical tenants additionally accept
        `wellnessRole` in the same call. Cannot demote the last ADMIN of a
        tenant — returns 409 LAST_ADMIN.
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [ADMIN, MANAGER, USER] }
                wellnessRole: { type: string, nullable: true }
      responses:
        "200": { description: Role changed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Last-admin protection or stale-role conflict. }
  /staff/{id}/reset-password:
    post:
      summary: Trigger a password reset for a staff user (ADMIN)
      description: Sends a one-time reset link to the user's email. Same shape as `/auth/forgot-password` but ADMIN-initiated.
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
      responses:
        "200": { description: Reset email queued. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /staff/{id}/resend-invite:
    post:
      summary: Resend the welcome / invite email (ADMIN)
      tags: [Users & Roles]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
      responses:
        "200": { description: Invite resent. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /staff/commission-profiles:
    get:
      summary: List commission profiles (ADMIN)
      description: Per-user commission rate + cadence config used by `wellnessOpsEngine` / `staffCommissionEngine`.
      tags: [Users & Roles]
      responses:
        "200": { description: Profiles. }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a commission profile (ADMIN)
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, ratePercent]
              properties:
                userId: { type: integer }
                ratePercent: { type: number }
                cadence: { type: string, enum: [monthly, quarterly] }
            example:
              userId: 12
              ratePercent: 8.5
              cadence: "monthly"
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /staff/revenue-goals:
    get:
      summary: List per-user revenue goals
      tags: [Users & Roles]
      responses:
        "200": { description: Goals. }
    post:
      summary: Create a revenue goal (ADMIN)
      tags: [Users & Roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, periodStart, periodEnd, targetCents]
              properties:
                userId: { type: integer }
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
                targetCents: { type: integer }
            example:
              userId: 12
              periodStart: "2026-04-01"
              periodEnd: "2026-06-30"
              targetCents: 5000000
      responses:
        "201": { description: Created. }
  /staff/revenue-goals/{id}:
    put:
      summary: Update a revenue goal (ADMIN)
      tags: [Users & Roles]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetCents: { type: integer }
                periodStart: { type: string, format: date }
                periodEnd: { type: string, format: date }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a revenue goal (ADMIN)
      tags: [Users & Roles]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /staff/commission-data:
    get:
      summary: Tenant-wide commission payout data (ADMIN)
      description: Returns per-user accrued + paid commission rollups for the requested period.
      tags: [Users & Roles]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200": { description: Commission data. }
  /staff/commission-data/{id}:
    get:
      summary: Per-user commission payout detail (ADMIN)
      tags: [Users & Roles]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: User commission data. }
        "404": { $ref: "#/components/responses/NotFound" }

  # ════════════════════════════════════════════════════════════════════
  # ADMIN & PLATFORM — additions (widgets, pages, settings, search, csv, etc.)
  # ════════════════════════════════════════════════════════════════════
  /widgets/catalog:
    get:
      summary: List the full widget catalog
      description: |
        Returns every widget the frontend dashboard system supports
        (`widgetKey`, label, default position, allowed sizes). The Roles
        & Permissions admin page uses this when picking which widgets to
        bind to a role.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items:
                      type: object
                      properties:
                        widgetKey: { type: string }
                        label: { type: string }
                        defaultPosition: { type: integer }
                        sizes: { type: array, items: { type: string } }
              example:
                widgets:
                  - widgetKey: "deals.pipeline"
                    label: "Deals pipeline"
                    defaultPosition: 0
                    sizes: ["sm", "md", "lg"]
        "401": { $ref: "#/components/responses/Unauthorized" }
  /widgets/me:
    get:
      summary: List widgets the caller is allowed to render
      description: |
        Intersection of the caller's role-bound widgets across every role
        they hold (deduped by widgetKey, lowest position wins). Drives the
        post-login dashboard hydration.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Per-user widget list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items:
                      type: object
              example:
                widgets:
                  - widgetKey: "deals.pipeline"
                    position: 0
                    size: "lg"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /pages/catalog:
    get:
      summary: List the full page catalog
      description: |
        Returns every page the frontend SPA can route to, with the
        permission key required to view it. Used by the Roles &
        Permissions admin page to render the page-toggle matrix.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Page catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        label: { type: string }
                        requiredPermission: { type: string }
                        landingForRoles:
                          type: array
                          items: { type: string }
              example:
                pages:
                  - key: "dashboard"
                    label: "Dashboard"
                    requiredPermission: "dashboard.read"
                    landingForRoles: ["MANAGER", "USER"]
        "401": { $ref: "#/components/responses/Unauthorized" }
  /pages/me:
    get:
      summary: List pages the caller is allowed to render
      description: |
        Page catalog filtered against the caller's `effectivePermissions`.
        Drives the sidebar nav.
      tags: [Admin & Platform]
      responses:
        "200": { description: Per-user accessible pages. }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /settings/webhook-credential:
    get:
      summary: Read tenant webhook signing config (ADMIN)
      description: |
        Returns the tenant's stored webhook HMAC config (signing key id,
        last rotated). The secret itself is NOT returned — only metadata
        + a `last4` masked tail. Used by the Settings → Integrations →
        Webhooks tab.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Webhook credential metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  keyId: { type: string, nullable: true }
                  last4: { type: string, nullable: true }
                  lastRotatedAt:
                    { type: string, format: date-time, nullable: true }
              example:
                configured: true
                keyId: "wh_2026_01"
                last4: "a91f"
                lastRotatedAt: "2026-06-01T12:00:00Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create or replace the tenant's webhook credential (ADMIN)
      description: Issues a new HMAC secret. The plaintext secret is returned ONCE in the response.
      tags: [Admin & Platform]
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  keyId: { type: string }
                  secret:
                    {
                      type: string,
                      description: Plaintext — shown ONCE. Persist client-side immediately.,
                    }
                  createdAt: { type: string, format: date-time }
              example:
                keyId: "wh_2026_06"
                secret: "whk_live_2c8d…"
                createdAt: "2026-06-17T05:00:00Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      summary: Revoke the tenant's webhook credential (ADMIN)
      tags: [Admin & Platform]
      responses:
        "204": { description: Revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /settings/webhook-credential/rotate:
    post:
      summary: Rotate the webhook credential (ADMIN)
      description: |
        Atomically swaps the active HMAC secret. Old secret stops verifying
        immediately (no grace window — partners MUST re-sign on rotation).
        Returns the new plaintext once.
      tags: [Admin & Platform]
      responses:
        "200": { description: Rotated. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /settings/lead-capture:
    get:
      summary: Read the tenant's multi-channel lead-capture config (ADMIN)
      description: |
        Returns the per-channel toggle map + cooldown map + form-routing
        mappings for the Multi-channel Lead Capture system
        (PRD_TRAVEL_MULTICHANNEL_LEADS FR-3.7). 17-channel allowlist:
        voyagr, web_form, whatsapp, ads, adsgpt, meta_ad, manual,
        indiamart, justdial, tradeindia, voice, sms, email, google_ad,
        linkedin_ad, referral, chat.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Capture settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: object
                    description: Object keyed by channel → boolean enabled.
                  cooldowns:
                    type: object
                    description: Object keyed by channel → seconds (0–86400).
                  formRoutingMappings:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        channel: { type: string }
                        externalFormId: { type: string }
                        subBrand: { type: string, nullable: true }
                        assignedTeamId: { type: integer, nullable: true }
                        isActive: { type: boolean }
                        notes: { type: string, nullable: true }
              example:
                channels:
                  meta_ad: true
                  whatsapp: true
                  indiamart: false
                cooldowns:
                  meta_ad: 3600
                  whatsapp: 1800
                formRoutingMappings:
                  - id: 7
                    channel: "meta_ad"
                    externalFormId: "1234567890123"
                    subBrand: "tmc"
                    assignedTeamId: null
                    isActive: true
                    notes: "DPS lead form"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      summary: Update the channel-toggle / cooldown maps (ADMIN)
      description: Partial — missing keys retain their stored value. Unknown channels are dropped silently.
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels: { type: object }
                cooldowns: { type: object }
            example:
              channels:
                meta_ad: true
                indiamart: true
              cooldowns:
                meta_ad: 1800
                whatsapp: 900
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  channels: { type: object }
                  cooldowns: { type: object }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /settings/lead-capture/form-routing-mappings:
    post:
      summary: Create a form-ID → sub-brand routing mapping (ADMIN)
      description: |
        Binds an external form id (Meta lead-ads form ID, Google form name,
        etc.) to a target sub-brand + team. Unique on
        (tenantId, channel, externalFormId).
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, externalFormId]
              properties:
                channel: { type: string }
                externalFormId:
                  type: string
                  description: "1-128 chars from [A-Za-z0-9_-]."
                subBrand:
                  {
                    type: string,
                    nullable: true,
                    enum: [tmc, rfu, travelstall, visasure],
                  }
                assignedTeamId: { type: integer, nullable: true }
                notes: { type: string, nullable: true }
            example:
              channel: "meta_ad"
              externalFormId: "1234567890123"
              subBrand: "tmc"
              notes: "DPS lead form"
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mapping: { type: object }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409":
          description: Duplicate mapping on (channel, externalFormId).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example:
                { error: "Mapping already exists", code: "DUPLICATE_MAPPING" }
  /settings/lead-capture/form-routing-mappings/{id}:
    put:
      summary: Update a form-routing mapping (ADMIN)
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: { type: string }
                externalFormId: { type: string }
                subBrand: { type: string, nullable: true }
                assignedTeamId: { type: integer, nullable: true }
                isActive: { type: boolean }
                notes: { type: string, nullable: true }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a form-routing mapping (ADMIN)
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /search:
    get:
      summary: Global free-text search
      description: |
        Cross-entity full-text search. Returns top hits across
        contacts, deals, tickets, KB articles, and (for travel
        tenants) trips + itineraries. Power-bar uses this to drive
        the cmd-K omnibar.
      tags: [Admin & Platform]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Mixed-type hit list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          {
                            type: string,
                            enum:
                              [contact, deal, ticket, article, trip, itinerary],
                          }
                        id: { type: integer }
                        label: { type: string }
                        snippet: { type: string }
                        url: { type: string }
                  total: { type: integer }
              example:
                hits:
                  - type: "contact"
                    id: 421
                    label: "Riya Mehta"
                    snippet: "riya.mehta@example.com — Lead"
                    url: "/contacts/421"
                total: 12
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /custom_objects/entities:
    get:
      summary: List custom-entity definitions
      description: Tenant-scoped custom Prisma-like entity schemas defined by the user via the Custom Objects builder.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Entities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items: { type: object }
              example:
                entities:
                  - id: 4
                    name: "Vehicle"
                    fieldSchema: [{ key: "vin", type: "string" }]
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a custom-entity definition
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, fieldSchema]
              properties:
                name: { type: string }
                fieldSchema: { type: array, items: { type: object } }
                description: { type: string }
            example:
              name: "Vehicle"
              fieldSchema:
                - { key: "vin", type: "string", required: true }
                - { key: "registeredOn", type: "date" }
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /custom_objects/entities/{id}:
    get:
      summary: Read one custom-entity definition
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Entity. }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a custom-entity definition
      description: |
        Field-schema mutations are validated against existing records:
        adding optional fields is safe; removing or narrowing existing
        fields returns 409 SCHEMA_NARROWING.
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                fieldSchema: { type: array, items: { type: object } }
                description: { type: string }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Schema-narrowing rejected. }
    delete:
      summary: Delete a custom-entity definition
      description: Soft-delete only if there are existing records; otherwise hard-delete.
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
        "404": { $ref: "#/components/responses/NotFound" }
  /custom_objects/records/{entityName}:
    get:
      summary: List records of a custom entity
      tags: [Admin & Platform]
      parameters:
        - in: path
          name: entityName
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  records: { type: array, items: { type: object } }
                  total: { type: integer }
              example:
                records:
                  - id: 1
                    values: { vin: "MH12AB1234", registeredOn: "2025-04-01" }
                total: 7
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: Create a record of a custom entity
      tags: [Admin & Platform]
      parameters:
        - in: path
          name: entityName
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                values: { type: object }
            example:
              values: { vin: "MH12AB1234", registeredOn: "2025-04-01" }
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /tasks:
    get:
      summary: List the caller's tasks
      description: |
        Returns the caller's tasks (and optionally team tasks if `?scope=team`).
        Filterable by `?status=`, `?priority=`, `?dueOn=`, `?assigneeId=`.
      tags: [Admin & Platform]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: status
          schema: { type: string, enum: [open, done, cancelled] }
        - in: query
          name: priority
          schema: { type: string, enum: [low, normal, high] }
        - in: query
          name: scope
          schema: { type: string, enum: [me, team, all] }
      responses:
        "200":
          description: Task list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks: { type: array, items: { type: object } }
                  total: { type: integer }
              example:
                tasks:
                  - id: 71
                    title: "Follow up with DPS Mumbai"
                    status: "open"
                    dueOn: "2026-06-20"
                    priority: "high"
                total: 14
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a task
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                dueOn: { type: string, format: date, nullable: true }
                priority:
                  { type: string, enum: [low, normal, high], default: normal }
                assigneeId: { type: integer, nullable: true }
                contactId: { type: integer, nullable: true }
                dealId: { type: integer, nullable: true }
            example:
              title: "Send revised quote to DPS"
              dueOn: "2026-06-20"
              priority: "high"
              assigneeId: 12
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /tasks/{id}:
    put:
      summary: Update a task
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                dueOn: { type: string, format: date, nullable: true }
                priority: { type: string }
                assigneeId: { type: integer, nullable: true }
                status: { type: string }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Soft-delete a task (ADMIN)
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /tasks/{id}/complete:
    put:
      summary: Mark a task complete
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Completed. }
        "404": { $ref: "#/components/responses/NotFound" }
  /tasks/{id}/restore:
    post:
      summary: Restore a soft-deleted task (ADMIN)
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Restored. }
  /projects:
    get:
      summary: List projects
      description: Project records (collections of related tasks, deals, files). Tenant-scoped.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects: { type: array, items: { type: object } }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a project
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string, nullable: true }
                startDate: { type: string, format: date, nullable: true }
                endDate: { type: string, format: date, nullable: true }
                status:
                  {
                    type: string,
                    enum: [planned, active, completed, cancelled],
                  }
                ownerId: { type: integer, nullable: true }
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /projects/stats:
    get:
      summary: Project-rollup KPIs
      tags: [Admin & Platform]
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  active: { type: integer }
                  completed: { type: integer }
  /projects/{id}:
    get:
      summary: Read a project
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Project. }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update a project
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                status: { type: string }
                description: { type: string, nullable: true }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a project
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /audit-viewer:
    get:
      summary: Browse the cross-entity audit log
      description: |
        Read-only viewer over `AuditLog` rows. Supports `?entity=`,
        `?entityId=`, `?action=`, `?userId=`, `?from=`, `?to=`, paging.
        Each row carries `prevHash`/`hash` for the audit-integrity chain
        (verified daily by `auditIntegrityEngine`).
      tags: [Admin & Platform]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: entity
          schema: { type: string }
        - in: query
          name: entityId
          schema: { type: integer }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: userId
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Audit rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object } }
                  total: { type: integer }
              example:
                items:
                  - id: 991
                    entity: "Patient"
                    entityId: 14
                    action: "UPDATE"
                    userId: 12
                    createdAt: "2026-06-17T05:00:00Z"
                total: 8412
        "401": { $ref: "#/components/responses/Unauthorized" }
  /audit-viewer/stats:
    get:
      summary: Audit-log rollup
      description: Per-action + per-entity counters across the queried range.
      tags: [Admin & Platform]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200": { description: Stats. }
  /audit-viewer/entity/{entity}/{id}:
    get:
      summary: Audit history for a specific entity row
      tags: [Admin & Platform]
      parameters:
        - in: path
          name: entity
          required: true
          schema: { type: string }
        - { $ref: "#/components/parameters/IdPath" }
      responses:
        "200": { description: Per-row audit history. }
  /audit-viewer/export.csv:
    get:
      summary: Export audit log as CSV (ADMIN)
      description: Streamed CSV of the filtered audit rows.
      tags: [Admin & Platform]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /booking-pages:
    get:
      summary: List booking pages
      description: Tenant booking pages (Calendly-style). Each links to a slug + slot config.
      tags: [Admin & Platform]
      responses:
        "200":
          description: Booking pages.
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingPages: { type: array, items: { type: object } }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Create a booking page
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, slug]
              properties:
                title: { type: string }
                slug: { type: string }
                description: { type: string }
                durationMinutes: { type: integer, default: 30 }
                hostUserId: { type: integer }
                availability: { type: object }
            example:
              title: "30-min discovery call"
              slug: "30min-discovery"
              durationMinutes: 30
              hostUserId: 12
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /booking-pages/stats:
    get:
      summary: Booking-page KPIs
      tags: [Admin & Platform]
      responses:
        "200": { description: Stats. }
  /booking-pages/{id}:
    put:
      summary: Update a booking page
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                durationMinutes: { type: integer }
                availability: { type: object }
      responses:
        "200": { description: Updated. }
    delete:
      summary: Delete a booking page
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /booking-pages/{id}/bookings:
    get:
      summary: List bookings against a page
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Bookings. }
  /booking-pages/{id}/cancel/{bookingId}:
    post:
      summary: Cancel a specific booking
      tags: [Admin & Platform]
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - in: path
          name: bookingId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Cancelled. }
        "404": { $ref: "#/components/responses/NotFound" }
  /booking-pages/{id}/upload:
    post:
      summary: Upload a page-banner image (multipart)
      tags: [Admin & Platform]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200": { description: Uploaded. }
        "413": { description: File too large. }
  /booking-pages/public/{slug}:
    get:
      summary: "[PUBLIC] Render a booking page by slug"
      tags: [Public]
      security: []
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200": { description: Page metadata + availability shape. }
        "404": { $ref: "#/components/responses/NotFound" }
  /booking-pages/public/{slug}/slots:
    get:
      summary: "[PUBLIC] Available slots for a booking page"
      tags: [Public]
      security: []
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: date
          schema: { type: string, format: date }
      responses:
        "200": { description: Slots. }
  /booking-pages/public/{slug}/book:
    post:
      summary: "[PUBLIC] Create a booking against a public page"
      tags: [Public]
      security: []
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, slotStart]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                slotStart: { type: string, format: date-time }
                notes: { type: string }
            example:
              name: "Asha Verma"
              email: "asha@example.com"
              slotStart: "2026-06-20T10:00:00Z"
      responses:
        "201": { description: Booking created. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Slot conflict. }
  /csp/report:
    post:
      summary: "[PUBLIC] Browser CSP violation report ingest"
      description: |
        Public, no-auth, browser-emitted CSP violation reports
        (Content-Security-Policy `report-uri` callback). Content-Type
        is `application/csp-report` (NOT JSON) — the global content-type
        guard whitelists this prefix.

        Rows land in the `SecurityIncident` table for ADMIN triage via
        `/api/security/reports` and `/api/security/incidents`.
      tags: [Admin & Platform]
      security: []
      requestBody:
        required: true
        content:
          application/csp-report:
            schema:
              type: object
              properties:
                csp-report:
                  type: object
                  description: Browser-supplied CSP violation report (RFC 7762 shape).
      responses:
        "204": { description: Stored. }
        "400": { description: Malformed report — silently dropped. }
  /csv/services/export.csv:
    get:
      summary: Export wellness services as CSV
      description: Generic CSV-IO endpoint cluster mounted at `/api/csv/*`. The wellness sister cluster is `/api/wellness/csv/*` (see Wellness section).
      tags: [Admin & Platform]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /csv/services/import.csv:
    post:
      summary: Import wellness services from CSV (multipart)
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: integer }
                  updated: { type: integer }
                  errors: { type: array, items: { type: object } }
        "400": { $ref: "#/components/responses/ValidationError" }
  /csv/products/export.csv:
    get:
      summary: Export products catalog as CSV
      tags: [Admin & Platform]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv:
              schema: { type: string }
  /csv/products/import.csv:
    post:
      summary: Import products from CSV (multipart)
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200": { description: Import summary. }
  /csv/membership-plans/export.csv:
    get:
      summary: Export membership plans as CSV
      tags: [Admin & Platform]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv: { schema: { type: string } }
  /csv/membership-plans/import.csv:
    post:
      summary: Import membership plans from CSV (multipart)
      tags: [Admin & Platform]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200": { description: Import summary. }
  /csv/bookings/export.csv:
    get:
      summary: Export bookings (read-only — no import)
      tags: [Admin & Platform]
      responses:
        "200":
          description: text/csv.
          content:
            text/csv: { schema: { type: string } }

  # ════════════════════════════════════════════════════════════════════
  # COMMUNICATIONS — additions
  # ════════════════════════════════════════════════════════════════════
  /communications/inbox:
    get:
      summary: Read the unified inbox (email + SMS + WhatsApp + call logs)
      description: |
        ADMIN/MANAGER-gated unified inbox surface. Returns a paginated
        merge of `EmailMessage` + `SmsMessage` + `WhatsAppMessage` +
        `CallLog` rows for the tenant, sorted by `createdAt desc`.
      tags: [Communications]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: channel
          schema: { type: string, enum: [email, sms, whatsapp, call] }
        - in: query
          name: contactId
          schema: { type: integer }
      responses:
        "200":
          description: Unified inbox.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          { type: string, enum: [email, sms, whatsapp, call] }
                        id: { type: integer }
                        contactId: { type: integer, nullable: true }
                        subject: { type: string, nullable: true }
                        snippet: { type: string }
                        createdAt: { type: string, format: date-time }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /communications/send-email:
    post:
      summary: Send an email from the unified inbox composer (ADMIN/MANAGER)
      description: |
        Multipart-capable email send. Attachments arrive on the `attachments[]`
        form field; body fields land as plain form fields. Sends via the
        tenant's configured provider (Mailgun / Nodemailer / SES).
      tags: [Communications]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [to, subject, bodyHtml]
              properties:
                to: { type: string }
                cc: { type: string }
                bcc: { type: string }
                subject: { type: string }
                bodyHtml: { type: string }
                attachments:
                  type: array
                  items: { type: string, format: binary }
                contactId: { type: integer }
                dealId: { type: integer }
      responses:
        "200":
          description: Sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailId: { type: integer }
                  messageId: { type: string }
                  delivered: { type: boolean }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /communications/calls:
    get:
      summary: List call logs (ADMIN/MANAGER)
      tags: [Communications]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: contactId
          schema: { type: integer }
      responses:
        "200":
          description: Calls.
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls: { type: array, items: { type: object } }
                  total: { type: integer }
  /communications/log-call:
    post:
      summary: Log a call against a contact (ADMIN/MANAGER)
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId, direction, durationSeconds]
              properties:
                contactId: { type: integer }
                direction: { type: string, enum: [inbound, outbound] }
                durationSeconds: { type: integer }
                notes: { type: string }
                outcome: { type: string }
            example:
              contactId: 421
              direction: "outbound"
              durationSeconds: 312
              notes: "Discussed pricing"
              outcome: "follow_up"
      responses:
        "201": { description: Logged. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /communications/track/{trackingId}/open.gif:
    get:
      summary: "[PUBLIC] 1x1 open-tracking pixel"
      description: Records an open event for the tracked outbound email; returns a 1x1 transparent GIF.
      tags: [Communications]
      security: []
      parameters:
        - in: path
          name: trackingId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: GIF.
          content:
            image/gif:
              schema: { type: string, format: binary }
  /communications/track/{trackingId}/click:
    get:
      summary: "[PUBLIC] Click-tracking redirect"
      description: Records a click event then 302-redirects to the original URL passed via `?u=`.
      tags: [Communications]
      security: []
      parameters:
        - in: path
          name: trackingId
          required: true
          schema: { type: string }
        - in: query
          name: u
          required: true
          schema: { type: string, format: uri }
      responses:
        "302": { description: Redirect to the original URL. }
  /communications/tracking/{emailId}:
    get:
      summary: Tracking history for one email (ADMIN/MANAGER)
      tags: [Communications]
      parameters:
        - in: path
          name: emailId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Per-email tracking events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  opens: { type: integer }
                  clicks: { type: integer }
                  events: { type: array, items: { type: object } }
        "404": { $ref: "#/components/responses/NotFound" }
  /email_templates:
    get:
      summary: List email templates
      description: Tenant-scoped email templates used by sequences, manual sends, automation rules.
      tags: [Communications]
      responses:
        "200":
          description: Templates.
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates: { type: array, items: { type: object } }
                  total: { type: integer }
              example:
                templates:
                  - id: 7
                    name: "Welcome email"
                    subject: "Welcome to {{tenant.name}}"
                    bodyHtml: "<p>Hi {{contact.firstName}}…</p>"
                total: 12
    post:
      summary: Create an email template
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, subject, bodyHtml]
              properties:
                name: { type: string }
                subject: { type: string }
                bodyHtml: { type: string }
                bodyText: { type: string, nullable: true }
            example:
              name: "Quote follow-up"
              subject: "Your quote from {{tenant.name}}"
              bodyHtml: "<p>Hi {{contact.firstName}}…</p>"
      responses:
        "201": { description: Created. }
        "400": { $ref: "#/components/responses/ValidationError" }
  /email_templates/{id}:
    get:
      summary: Read one email template
      tags: [Communications]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: Template. }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      summary: Update an email template
      tags: [Communications]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                subject: { type: string }
                bodyHtml: { type: string }
      responses:
        "200": { description: Updated. }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete an email template
      tags: [Communications]
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "204": { description: Deleted. }
  /email-threading/auto-thread:
    post:
      summary: Re-thread an email message into its conversation
      description: |
        Recomputes `threadKey` for an EmailMessage row based on subject +
        Message-ID + In-Reply-To headers. Used after inbound emails arrive
        with manually-rewritten subjects.
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emailId]
              properties:
                emailId: { type: integer }
      responses:
        "200": { description: Threaded. }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-threading/threads:
    get:
      summary: List email threads
      tags: [Communications]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: contactId
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string, enum: [open, archived] }
      responses:
        "200":
          description: Threads.
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads: { type: array, items: { type: object } }
                  total: { type: integer }
  /email-threading/threads/{threadId}:
    get:
      summary: Read one email thread (subject, participants, messages)
      tags: [Communications]
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Thread.
          content:
            application/json:
              schema:
                type: object
                properties:
                  threadKey: { type: string }
                  subject: { type: string }
                  messages: { type: array, items: { type: object } }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-threading/threads/{threadId}/mark-read:
    post:
      summary: Mark a thread as read
      tags: [Communications]
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Marked. }
  /email-threading/threads/{threadId}/archive:
    post:
      summary: Archive a thread
      tags: [Communications]
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: Archived. }
  /email-threading/reply:
    post:
      summary: Reply inside an existing thread
      description: |
        Sends an outbound EmailMessage that inherits its parent's
        `threadKey`. Body is sanitized via the global content-sanitizer
        plus the email-specific HTML safe-list.
      tags: [Communications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [threadKey, bodyHtml]
              properties:
                threadKey: { type: string }
                bodyHtml: { type: string }
                attachmentIds: { type: array, items: { type: integer } }
      responses:
        "201": { description: Sent. }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
  /email-threading/messages:
    get:
      summary: List individual email messages (advanced filter)
      tags: [Communications]
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Limit" }
        - in: query
          name: contactId
          schema: { type: integer }
      responses:
        "200": { description: Messages. }
  /email-threading/stats:
    get:
      summary: Email-thread KPIs
      tags: [Communications]
      responses:
        "200":
          description: Stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  openThreads: { type: integer }
                  unreadMessages: { type: integer }
                  averageReplyTimeMin: { type: number }

  # ════════════════════════════════════════════════════════════════════
  # DEALS — additions (CPQ, playbooks)
  # ════════════════════════════════════════════════════════════════════
  /cpq/products:
    get:
      summary: List CPQ product catalog
      description: |
        CPQ product catalog — entries used by the Quote Builder + Deal
        line-items. Tenant-scoped.
      tags: [Deals]
      responses:
        "200":
          description: Products.
          content:
            application/json:
              schema:
                type: object
                properties:
                  products: { type: array, items: { type: object } }
                  total: { type: integer }
              example:
                products:
                  - id: 17
                    name: "Annual support"
                    sku: "SUP-A"
                    priceCents: 250000
                    currency: "USD"
                total: 24
    post:
      summary: Create a CPQ product
      tags: [Deals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, priceCents]
              properties:
                name: { type: string }
                sku: { type: string }
                priceCents: { type: integer }
                currency: { type: string, default: "USD" }
      responses:
        "201": { description: Created. }
