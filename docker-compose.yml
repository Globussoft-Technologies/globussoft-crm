# Local development stack — Option B: fully containerized
# Boots MySQL + Backend + Frontend in one command.
#
# Quickstart:
#   docker compose up --build -d     # build images + start all services
#   docker compose logs -f backend   # watch backend boot
#   docker compose down -v           # tear down + wipe DB
#
# URLs:
#   Frontend (marketing + app):  http://localhost:5173
#   Backend API:                 http://localhost:3000
#   MySQL (if you need CLI):     localhost:3307  root / local_dev_pw
#
# Razorpay test keys (optional):
#   Create a .env file in the project root with:
#     RAZORPAY_KEY_ID=rzp_test_xxxxxxxxxxxx
#     RAZORPAY_KEY_SECRET=your_test_secret
#   docker compose will read it automatically.

services:
  mysql:
    image: mysql:8.0
    container_name: gbscrm-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: local_dev_pw
      MYSQL_DATABASE: gbscrm_local
    ports:
      - "3307:3306"
    volumes:
      - gbscrm_local_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal_dev_pw"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - gbscrm-local

  backend:
    build: ./backend
    container_name: gbscrm-backend-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:local_dev_pw@mysql:3306/gbscrm_local"
      JWT_SECRET: "dev-jwt-secret-change-me-in-production"
      PORTAL_JWT_SECRET: "dev-portal-secret-change-me-in-production"
      NODE_ENV: "development"
      PORT: "3000"
      FRONTEND_URL: "http://localhost:5173"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      # Graceful degradation for optional services
      SENDGRID_API_KEY: ""
      SENDGRID_FROM_EMAIL: "noreply@localhost"
      AWS_S3_BUCKET_NAME: ""
      AWS_REGION: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gbscrm-local

  frontend:
    build:
      context: ./frontend
      args:
        VITE_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
    container_name: gbscrm-frontend-local
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - gbscrm-local

volumes:
  gbscrm_local_data:
    name: gbscrm_local_data

networks:
  gbscrm-local:
    name: gbscrm-local
