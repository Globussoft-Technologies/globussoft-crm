<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- #704: branded favicon + apple-touch-icon. PNG favicon with Globussoft
         logo (no background). The runtime app updates document.title to
         "{Page} — {Tenant Name}" in Layout.jsx so the tab title reflects the
         active tenant. -->
    <link rel="icon" type="image/png" href="/logo-header-nobg.png" />
    <link rel="alternate icon" href="/logo-header-nobg.png" />
    <link rel="apple-touch-icon" href="/logo-header-nobg.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#265855" />
    <!-- #917 slice S1 (FR-3.2): per-request CSP nonce placeholder. The
         backend mints res.locals.cspNonce; production-serving Nginx (or the
         Express static handler) substitutes __CSP_NONCE__ with the live
         nonce per response and stamps the same value onto every
         <script>/<style> tag it ships. Until that deploy-layer wiring
         lands, this meta tag is inert. -->
    <meta name="csp-nonce" content="__CSP_NONCE__" />
    <title>Globussoft CRM</title>
  </head>
  <body>
    <!-- #868 (BUG-T19): apply theme BEFORE React mounts to avoid a white
         flash on /login, /forgot-password, /reset-password (pre-auth routes
         where App.jsx's theme useEffect has not yet run). Reads
         localStorage.theme ("light" | "dark" | "system" | null); falls back
         to prefers-color-scheme. Sets data-theme on <html> so the CSS
         variables in index.css resolve correctly on the very first paint.
         Mirrors the canonical FOUC-prevention pattern used by Vercel/
         Netlify-style apps. The existing React effect in App.jsx still runs
         post-mount and stays the source of truth for runtime theme changes;
         this script only seeds the initial value. -->
    <script nonce="__CSP_NONCE__">
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var effective = saved;
          if (saved === 'system' || !saved) {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', effective);
        } catch (e) {
          /* localStorage blocked (private mode, restrictive CSP, etc.) —
             default to no attr, which renders as light per index.css. */
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
