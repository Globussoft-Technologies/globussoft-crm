# SonarQube scan configuration for the main branch.
# This file is temporary and will be removed after the scan.

sonar.projectKey=globussoft-crm-main
sonar.projectName=Globussoft CRM Main Branch
sonar.host.url=http://localhost:9000

sonar.sources=.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.git/**,\
  **/coverage/**,\
  **/playwright-results/**,\
  **/e2e_screenshots/**,\
  **/qa_screenshots/**,\
  **/.scannerwork/**,\
  **/.wwebjs_auth/**,\
  **/docs/archive/**,\
  **/docs/gaps/**

# The JS/TS analyzer needs a larger heap for a monorepo this size.
sonar.javascript.node.maxspace=8192

sonar.sourceEncoding=UTF-8
